<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vansh (à¤µà¤‚à¤¶) â€” Royal Inbox</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/shared.css?v=7">
  <style>
    .inbox-layout {
      display: flex; gap: 24px; height: calc(100vh - 140px);
    }
    
    .inbox-list {
      flex: 0 0 350px; background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); display: flex; flex-direction: column; overflow: hidden;
    }
    .inbox-header { padding: 20px; border-bottom: 1px solid var(--border); font-family: 'Cinzel', serif; font-weight: 700; font-size: 18px; background: var(--bg-elevated); color: var(--royal-red);}
    
    .inbox-threads { overflow-y: auto; flex: 1; }

    .msg-item {
      padding: 20px; border-bottom: 1px solid var(--border); display: flex; gap: 16px; cursor: pointer; transition: 0.2s;
    }
    .msg-item:hover { background: var(--bg-hover); }
    .msg-item.active { background: var(--royal-red-dim); border-left: 4px solid var(--royal-red); }
    
    .msg-ava { width: 48px; height: 48px; border-radius: 50%; background-size: cover; background-position: center; border: 1px solid var(--border); flex-shrink: 0; }
    .msg-details { flex: 1; min-width: 0; }
    .msg-name { font-weight: 700; font-size: 15px; color: var(--text); margin-bottom: 4px; display: flex; justify-content: space-between;}
    .msg-time { font-size: 11px; color: var(--text-muted); font-weight: 500; }
    .msg-preview { font-size: 13px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    
    .msg-badge { background: var(--royal-red); color: #fff; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 10px; margin-left: 8px; }
    
    .inbox-view {
      flex: 1; background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); display: flex; flex-direction: column; overflow: hidden;
    }
    
    .view-header {
      padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; background: var(--bg-elevated);
    }
    .view-header .msg-ava { width: 40px; height: 40px; }
    
    .view-body { flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 24px; background: var(--bg); }
    
    .chat-bubble { max-width: 70%; padding: 16px 20px; border-radius: 16px; font-size: 14px; line-height: 1.5; position: relative;}
    .chat-left { background: var(--bg-card); border: 1px solid var(--border); align-self: flex-start; border-top-left-radius: 4px; color: var(--text);}
    .chat-right { background: var(--royal-red); border: 1px solid var(--royal-red); color: #fff; align-self: flex-end; border-top-right-radius: 4px;}
    
    .chat-time { font-size: 11px; color: var(--text-muted); margin-top: 8px; text-align: right; }
    .chat-right .chat-time { color: rgba(255,255,255,0.8); }
    
    .alliance-card {
      background: var(--bg-card); border: 1px solid var(--royal-red); border-radius: 12px; padding: 20px;
      margin-top: 12px; box-shadow: var(--shadow-sm);
    }

    .btn-royal {
      background: var(--royal-red); color: #fff; border: none; font-family: 'Cinzel', serif; font-weight: 700; font-size: 13px;
      padding: 10px 20px; border-radius: 6px; cursor: pointer; transition: 0.2s;
    }
    .btn-royal:hover { background: #8a1a25; }
    
    .view-input {
      padding: 20px; border-top: 1px solid var(--border); background: var(--bg-card); display: flex; gap: 12px; align-items: center;
    }
    .view-input input { 
      flex: 1; padding: 12px 16px; border: 1px solid var(--border); border-radius: 20px; 
      outline: none; font-family: inherit; color: var(--text); background: var(--bg-elevated);
    }
    .view-input input:focus { border-color: var(--royal-red); }
    
    @media (max-width: 900px) {
      .inbox-layout { flex-direction: column; height: auto; }
      .inbox-list { flex: none; height: 300px; overflow-y: auto; }
      .inbox-view { height: 500px; }
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-area">
      <header class="topbar" id="topbar"></header>
      <div class="page-content" style="padding-bottom: 0;">
        
        <div class="inbox-layout anim">
          
          <div class="inbox-list">
            <div class="inbox-header">Royal Messages</div>
            <div class="inbox-threads" id="threadsContainer">
              <!-- Dynamically injected threads -->
            </div>
          </div>
          
          <div class="inbox-view" id="activeChatView">
            <!-- Dynamically injected chat window -->
          </div>
          
        </div>
        
      </div>
    </div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js?v=11"></script>
  <script src="js/shared-auth.js?v=11"></script>
  <script src="js/shared-data.js?v=11"></script>
  <script src="js/shared-nav.js?v=11"></script>
  <script>
    if (!requireAuth()) throw '';
    initNav('inbox');

    const INBOX_KEY = 'vansh_inbox_db';
    let currentThreadId = null;

    function formatTime(date) {
      return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function loadInbox() {
      let data = localStorage.getItem(INBOX_KEY);
      if (!data) {
        // Seed Data
        data = [
          {
            id: 'thread_1',
            contactName: 'Meera Verma',
            contactAvatar: 'https://images.unsplash.com/photo-1544005313-94ddf0286df2?q=80&w=150&auto=format&fit=crop',
            verified: true,
            isAlliance: true,
            messages: [
              {
                sender: 'them',
                time: '10:42 AM',
                text: 'Namaste. I am writing to you through the Vansh secure network regarding a potential alliance for my son, Rohan Verma.',
                hasAllianceCard: true
              },
              {
                sender: 'me',
                time: '11:15 AM',
                text: 'Namaste Meera ji. Thank you for reaching out via the network. We will review the biodata and consult with the family elders this evening.'
              }
            ]
          },
          {
            id: 'thread_2',
            contactName: 'Anand Sharma',
            contactAvatar: 'https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?q=80&w=150&auto=format&fit=crop',
            verified: true,
            isAlliance: false,
            messages: [
              {
                sender: 'them',
                time: 'Yesterday',
                text: 'Are you attending the Patriarch council next week in Uttarakhand?'
              }
            ]
          }
        ];
        localStorage.setItem(INBOX_KEY, JSON.stringify(data));
      } else {
        data = JSON.parse(data);
      }
      return data;
    }

    function renderThreads() {
      const threads = loadInbox();
      const container = document.getElementById('threadsContainer');
      
      container.innerHTML = threads.map(t => {
        const lastMsg = t.messages[t.messages.length - 1];
        const isActive = t.id === currentThreadId ? 'active' : '';
        const badge = t.isAlliance ? `<div class="msg-badge">Alliance Request</div>` : '';
        
        return `
          <div class="msg-item ${isActive}" onclick="openThread('${t.id}')">
            <div class="msg-ava" style="background-image:url('${t.contactAvatar}')"></div>
            <div class="msg-details">
              <div class="msg-name">${t.contactName} <span class="msg-time">${lastMsg ? lastMsg.time : ''}</span></div>
              <div class="msg-preview">${lastMsg ? lastMsg.text : 'No messages'}</div>
              ${badge}
            </div>
          </div>
        `;
      }).join('');
    }

    function openThread(threadId) {
      currentThreadId = threadId;
      renderThreads(); // update active class
      
      const threads = loadInbox();
      const thread = threads.find(t => t.id === threadId);
      const container = document.getElementById('activeChatView');
      
      if (!thread) return;

      const verifiedBadge = thread.verified ? `<div style="font-size: 12px; color: var(--royal-red); font-weight: 700; text-transform: uppercase; letter-spacing: 1px;">âœ“ Verified Lineage Member</div>` : '';

      let messagesHtml = thread.messages.map(m => {
        const bubbleClass = m.sender === 'me' ? 'chat-right' : 'chat-left';
        let extraHtml = '';
        
        if (m.hasAllianceCard) {
          extraHtml = `
            <div class="alliance-card">
              <div style="font-family:'Cinzel', serif; font-weight: 800; color: var(--royal-red); margin-bottom: 8px; font-size:16px;">Official Alliance Proposal</div>
              <div style="font-size: 13px; color: var(--text-secondary); margin-bottom: 16px;">
                <b>Subject:</b> Rohan Verma (Gen 3)<br>
                <b>Gotra Match:</b> <span style="color: var(--green)">100% Exogamy Verified</span>
              </div>
              <button class="btn-royal" onclick="alert('Viewing Secure Biodata in Premium version...')">View Royal Biodata</button>
            </div>
          `;
        }
        
        return `
          <div class="chat-bubble ${bubbleClass}">
            ${m.text}
            ${extraHtml}
            <div class="chat-time">${m.time}</div>
          </div>
        `;
      }).join('');

      container.innerHTML = `
        <div class="view-header">
          <div class="msg-ava" style="background-image:url('${thread.contactAvatar}')"></div>
          <div>
            <div style="font-weight: 800; color: var(--text); font-size: 18px;">${thread.contactName}</div>
            ${verifiedBadge}
          </div>
        </div>
        
        <div class="view-body" id="chatBody">
          <div style="text-align:center; font-size: 12px; color: var(--text-muted); font-weight: 700; letter-spacing: 2px; text-transform: uppercase;">Secure Chat History</div>
          ${messagesHtml}
        </div>
        
        <div class="view-input">
          <input type="text" id="chatInput" placeholder="Type a secure message..." onkeypress="handleKeyPress(event)">
          <button class="btn-royal" onclick="sendReply()">Send Royal Dispatch</button>
        </div>
      `;
      
      scrollToBottom();
    }

    function handleKeyPress(e) {
      if (e.key === 'Enter') {
        sendReply();
      }
    }

    function sendReply() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text || !currentThreadId) return;
      
      const threads = loadInbox();
      const thread = threads.find(t => t.id === currentThreadId);
      
      thread.messages.push({
        sender: 'me',
        time: formatTime(new Date()),
        text: text
      });
      
      localStorage.setItem(INBOX_KEY, JSON.stringify(threads));
      
      openThread(currentThreadId); // re-render chat
    }

    function scrollToBottom() {
      const body = document.getElementById('chatBody');
      if (body) {
        body.scrollTop = body.scrollHeight;
      }
    }

    // Initialize
    const allThreads = loadInbox();
    if(allThreads.length > 0) {
      openThread(allThreads[0].id);
    } else {
      renderThreads();
    }
  </script>
</body>
</html>
