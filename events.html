<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vansh (वंश) — Royal Events</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/shared.css?v=6">
  <style>
    /* Premium Indian Wedding Theme */
    body {
      background-color: #2b060d;
      background-image: 
        radial-gradient(circle at top right, rgba(212, 175, 55, 0.15) 0%, transparent 40%),
        radial-gradient(circle at bottom left, rgba(212, 175, 55, 0.15) 0%, transparent 40%);
      color: #fdfaf0;
    }
    .main-area { background: transparent; }

    .museum-header-card { 
      padding: 50px 40px; 
      background: linear-gradient(135deg, rgba(74, 14, 27, 0.95), rgba(43, 6, 13, 0.95));
      border: 2px solid var(--gold); 
      border-radius: 12px; 
      margin-bottom: 40px; 
      box-shadow: 0 10px 40px rgba(0,0,0,0.5), inset 0 0 30px rgba(212,175,55,0.1); 
      position: relative;
      overflow: hidden;
      display: flex; justify-content: space-between; align-items: center;
    }
    
    .museum-header-card::before {
      content: ''; position: absolute; top: -50px; left: -50px; width: 150px; height: 150px;
      background: radial-gradient(circle, transparent 30%, var(--gold) 31%, var(--gold) 33%, transparent 34%, transparent 45%, var(--gold) 46%, var(--gold) 48%, transparent 49%);
      opacity: 0.2; transform: rotate(45deg);
    }

    .museum-header-text h1 { 
      font-size: 38px; font-weight: 800; font-family: 'Cinzel', serif; color: var(--gold); 
      margin-bottom: 12px; text-transform: uppercase; letter-spacing: 4px;
      text-shadow: 0 4px 15px rgba(212,175,55,0.4);
    }
    .museum-header-text p { font-size: 16px; color: #ffe89c; letter-spacing: 1px; max-width: 600px; line-height: 1.5; }

    .btn-royal {
      background: linear-gradient(135deg, #d4af37, #aa8620); color: #fff; border: none;
      font-family: 'Cinzel', serif; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
      padding: 14px 28px; border-radius: 8px; cursor: pointer; transition: 0.3s;
      box-shadow: 0 4px 15px rgba(212,175,55,0.3); z-index: 2; position: relative;
    }
    .btn-royal:hover { background: linear-gradient(135deg, #ebd17a, #c49d29); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(212,175,55,0.5); }

    .event-card {
      background: linear-gradient(to right, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
      border: 1px solid rgba(212,175,55,0.3); border-radius: 12px;
      display: flex; overflow: hidden; margin-bottom: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      backdrop-filter: blur(10px); transition: 0.3s;
    }
    .event-card:hover { transform: translateY(-3px); border-color: var(--gold); box-shadow: 0 15px 40px rgba(212,175,55,0.2); }
    
    .event-cover { width: 200px; background-size: cover; background-position: center; border-right: 2px solid #2b060d; }

    .event-date-box {
      background: linear-gradient(135deg, var(--gold), #aa8620); color: #2b060d; width: 150px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 24px; text-align: center; border-right: 2px solid #2b060d;
    }
    .event-month { font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
    .event-day { font-family: 'Cinzel', serif; font-size: 54px; font-weight: 800; line-height: 1; margin: 4px 0; }
    .event-year { font-size: 16px; font-weight: 700; opacity: 0.9; }
    
    .event-details { padding: 32px; flex: 1; display: flex; flex-direction: column; justify-content: center;}
    .event-title { font-family: 'Cinzel', serif; font-size: 26px; font-weight: 800; color: #fff; margin-bottom: 10px; letter-spacing: 1px;}
    .event-meta { font-size: 14px; color: #ffe89c; margin-bottom: 16px; display: flex; gap: 20px; font-weight: 600; }
    .event-meta span { display: flex; align-items: center; gap: 6px; }
    
    .event-desc { font-size: 15px; color: rgba(255,255,255,0.7); line-height: 1.6; margin-bottom: 24px; }
    
    .event-actions { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid rgba(212,175,55,0.2); padding-top: 24px; margin-top: auto;}
    
    .btn-outline-gold { background: transparent; color: #ffe89c; border: 1px solid var(--gold); padding: 10px 20px; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.3s; }
    .btn-outline-gold:hover { background: rgba(212,175,55,0.1); color: #fff; }
    .btn-danger { background: rgba(220,53,69,0.1); color: #dc3545; border: 1px solid #dc3545; padding: 10px 20px; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.3s; }
    .btn-danger:hover { background: #dc3545; color: #fff; }

    /* Modal Styles */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8);
      backdrop-filter: blur(5px); z-index: 1000; display: none; align-items: center; justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal-box {
      background: linear-gradient(135deg, rgba(74, 14, 27, 0.98), rgba(43, 6, 13, 0.98));
      border: 2px solid var(--gold); border-radius: 12px; width: 100%; max-width: 500px;
      padding: 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); position: relative; max-height: 90vh; overflow-y: auto;
    }
    .modal-title { font-family: 'Cinzel', serif; font-size: 24px; color: var(--gold); margin-bottom: 24px; text-transform: uppercase; letter-spacing: 2px; text-align: center;}
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; color: #ffe89c; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .form-input {
      width: 100%; background: rgba(0,0,0,0.5); border: 1px solid rgba(212,175,55,0.4);
      color: #fff; padding: 12px 16px; border-radius: 6px; font-family: 'Inter', sans-serif;
    }
    .form-input:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 10px rgba(212,175,55,0.2); }
    .modal-close { position: absolute; top: 20px; right: 20px; background: none; border: none; color: #ffe89c; font-size: 24px; cursor: pointer; }
    .modal-close:hover { color: #fff; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 16px; margin-top: 32px; }

    @media (max-width: 768px) {
      .event-card { flex-direction: column; }
      .event-cover { width: 100%; height: 200px; border-right: none; border-bottom: 2px solid #2b060d; }
      .event-date-box { width: 100%; padding: 16px; flex-direction: row; gap: 12px; border-right: none; border-bottom: 2px solid #2b060d; }
      .event-day { font-size: 32px; }
      .event-meta { flex-direction: column; gap: 8px; }
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-area">
      <header class="topbar" id="topbar"></header>
      <div class="page-content">
        
        <div class="museum-header-card anim">
          <div class="museum-header-text">
            <h1 id="eventsDynamicTitle">Royal Events</h1>
            <p>Schedule and manage majestic gatherings, sacred rituals, and grand alliances for your entire lineage network.</p>
          </div>
          <button class="btn-royal" onclick="openEventModal()">+ Create Event</button>
        </div>
        
        <div class="anim anim-delay-1" id="eventsList" style="max-width: 800px;">
          <!-- Dynamic Content -->
        </div>
        
      </div>
    </div>
  </div>

  <!-- Create Event Modal -->
  <div class="modal-overlay" id="eventModal">
    <div class="modal-box">
      <button class="modal-close" onclick="closeEventModal()">✕</button>
      <div class="modal-title">Host a Royal Event</div>
      
      <div class="form-group">
        <label class="form-label">Event Title</label>
        <input type="text" id="evTitle" class="form-input" placeholder="e.g. Annual Patriarch Council">
      </div>
      
      <div style="display:flex; gap:16px;">
        <div class="form-group" style="flex:1">
          <label class="form-label">Date</label>
          <input type="date" id="evDate" class="form-input" style="color-scheme: dark;">
        </div>
        <div class="form-group" style="flex:1">
          <label class="form-label">Time</label>
          <input type="time" id="evTime" class="form-input" style="color-scheme: dark;">
        </div>
      </div>
      
      <div class="form-group">
        <label class="form-label">Location</label>
        <input type="text" id="evLocation" class="form-input" placeholder="e.g. Ancestral Estate, Uttarakhand">
      </div>
      
      <div class="form-group">
        <label class="form-label">Upload Event Cover</label>
        <input type="file" id="evFile" class="form-input" accept="image/*" style="padding: 9px 16px;">
        <div style="font-size:11px; color:rgba(255,255,255,0.5); margin-top:6px;">Select a banner image for this event.</div>
      </div>

      <div class="form-group">
        <label class="form-label">Description & Details</label>
        <textarea id="evDesc" class="form-input" rows="3" placeholder="Provide details for the attendees..."></textarea>
      </div>
      
      <div class="modal-footer">
        <button class="btn" style="background:transparent; color:#ffe89c; border:1px solid rgba(212,175,55,0.4)" onclick="closeEventModal()">Cancel</button>
        <button class="btn-royal" id="saveEvBtn" onclick="saveEvent()">Broadcast Event</button>
      </div>
    </div>
  </div>

  <script src="js/shared-auth.js"></script>
  <script src="js/shared-data.js"></script>
  <script src="js/shared-nav.js"></script>
  <script>
    if (!requireAuth()) throw '';
    initNav('events');

    // Dynamic Title
    const authData = getAuthData();
    const currentUser = getMemberById(authData.userId);
    if (currentUser && currentUser.firstName) {
      document.getElementById('eventsDynamicTitle').innerText = currentUser.firstName + "'s Royal Events";
    }

    const EVENTS_KEY = 'vansh_events_db';
    const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

    function loadEvents() {
      let data = localStorage.getItem(EVENTS_KEY);
      if (!data) {
        // Default Seed Data
        const d1 = new Date(); d1.setDate(d1.getDate() + 14);
        const d2 = new Date(); d2.setMonth(d2.getMonth() + 2);
        
        data = [
          {
            id: 'ev_seed_1',
            title: "Grand Wedding Anniversary",
            dateStr: d1.toISOString().split('T')[0],
            time: "19:00",
            location: "Taj Palace, New Delhi",
            imgUrl: "https://images.unsplash.com/photo-1544006659-f0b21884ce1d?q=80&w=600&auto=format&fit=crop",
            desc: "A grand celebration uniting the extended family. Join the network for an evening of celebration, dining, and royal bonding."
          },
          {
            id: 'ev_seed_2',
            title: "Annual Patriarch Council",
            dateStr: d2.toISOString().split('T')[0],
            time: "10:00",
            location: "Ancestral Estate, Uttarakhand",
            imgUrl: "https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=600&auto=format&fit=crop",
            desc: "The yearly gathering of the eldest members of the lineage network to discuss estate management, upcoming alliances, and network expansion."
          }
        ];
        localStorage.setItem(EVENTS_KEY, JSON.stringify(data));
      } else {
        data = JSON.parse(data);
        // Backfill IDs for old events
        let changed = false;
        data.forEach(e => {
          if (!e.id) {
            e.id = 'ev_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
            changed = true;
          }
        });
        if (changed) {
          localStorage.setItem(EVENTS_KEY, JSON.stringify(data));
        }
      }
      
      // Sort chronologically
      data.sort((a,b) => new Date(a.dateStr) - new Date(b.dateStr));
      return data;
    }

    function toggleRsvp(id, btnElement) {
      let events = loadEvents();
      let ev = events.find(e => e.id === id);
      if (ev) {
        ev.rsvped = !ev.rsvped;
        localStorage.setItem(EVENTS_KEY, JSON.stringify(events));
        
        if (ev.rsvped) {
          btnElement.innerText = "RSVP'd ✓";
          btnElement.style.background = 'rgba(212,175,55,0.2)';
          btnElement.style.color = '#fff';
        } else {
          btnElement.innerText = "RSVP";
          btnElement.style.background = 'transparent';
          btnElement.style.color = '#ffe89c';
        }
      }
    }

    function shareEvent(title, dateStr, location, btnElement) {
      const shareText = `Join us for ${title} on ${dateStr} at ${location}!`;
      navigator.clipboard.writeText(shareText).then(() => {
        const originalText = btnElement.innerText;
        btnElement.innerText = "Copied!";
        setTimeout(() => { btnElement.innerText = originalText; }, 2000);
      }).catch(err => {
        alert("Could not copy to clipboard. Details: " + shareText);
      });
    }

    function renderEvents() {
      const events = loadEvents();
      const container = document.getElementById('eventsList');
      
      if(events.length === 0) {
        container.innerHTML = '<div style="color:#ffe89c; padding:20px;">No upcoming events. Host a gathering to unite your family!</div>';
        return;
      }

      container.innerHTML = events.map(ev => {
        const d = new Date(ev.dateStr);
        const month = monthNames[d.getMonth()];
        const day = String(d.getDate()).padStart(2, '0');
        const year = d.getFullYear();
        
        // Convert 24h time to 12h AM/PM
        let timeStr = ev.time;
        if(timeStr) {
          const [h, m] = timeStr.split(':');
          let hours = parseInt(h);
          const ampm = hours >= 12 ? 'PM' : 'AM';
          hours = hours % 12;
          hours = hours ? hours : 12;
          timeStr = hours + ':' + m + ' ' + ampm;
        } else {
          timeStr = "Time TBA";
        }
        
        const coverHtml = ev.imgUrl ? `<div class="event-cover" style="background-image:url('${ev.imgUrl}')"></div>` : '';
        
        const rsvpText = ev.rsvped ? "RSVP'd ✓" : "RSVP";
        const rsvpStyle = ev.rsvped ? "background: rgba(212,175,55,0.2); color: #fff;" : "";

        return `
          <div class="event-card">
            ${coverHtml}
            <div class="event-date-box">
              <div class="event-month">${month}</div>
              <div class="event-day">${day}</div>
              <div class="event-year">${year}</div>
            </div>
            <div class="event-details">
              <div class="event-title">${ev.title}</div>
              <div class="event-meta">
                <span>📍 ${ev.location}</span>
                <span>🕒 ${timeStr}</span>
              </div>
              <div class="event-desc">${ev.desc}</div>
              <div class="event-actions">
                <div style="display:flex; gap: 12px">
                  <button class="btn-outline-gold" style="${rsvpStyle}" onclick="toggleRsvp('${ev.id}', this)">${rsvpText}</button>
                  <button class="btn-outline-gold" onclick="shareEvent('${ev.title.replace(/'/g, "\\'")}', '${ev.dateStr}', '${ev.location.replace(/'/g, "\\'")}', this)">Share</button>
                </div>
                <button class="btn-danger" onclick="cancelEvent('${ev.id}')">Cancel Event</button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function openEventModal() { document.getElementById('eventModal').classList.add('active'); }
    function closeEventModal() { 
      document.getElementById('eventModal').classList.remove('active');
      document.getElementById('evTitle').value = '';
      document.getElementById('evDate').value = '';
      document.getElementById('evTime').value = '';
      document.getElementById('evLocation').value = '';
      document.getElementById('evDesc').value = '';
      document.getElementById('evFile').value = '';
    }

    function cancelEvent(id) {
      if(!id || id === 'undefined') {
         alert("Cannot delete this legacy event directly. Please refresh the page to assign it an ID and try again.");
         return;
      }
      if(!confirm("Are you sure you want to cancel and delete this event?")) return;
      let events = loadEvents();
      events = events.filter(e => String(e.id) !== String(id));
      localStorage.setItem(EVENTS_KEY, JSON.stringify(events));
      renderEvents();
    }

    function compressAndSaveImage(file, callback) {
      const reader = new FileReader();
      reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
          const canvas = document.createElement('canvas');
          const max_size = 800;
          let width = img.width;
          let height = img.height;
          
          if (width > height) {
            if (width > max_size) { height *= max_size / width; width = max_size; }
          } else {
            if (height > max_size) { width *= max_size / height; height = max_size; }
          }
          
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          
          const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
          callback(dataUrl);
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    function saveEvent() {
      const title = document.getElementById('evTitle').value.trim();
      const dateStr = document.getElementById('evDate').value;
      if(!title || !dateStr) return alert("Title and Date are required!");

      const fileInput = document.getElementById('evFile');
      const btn = document.getElementById('saveEvBtn');
      
      const finalizeSave = (imgUrl) => {
        const newEv = {
          id: 'ev_' + Date.now(),
          title: title,
          dateStr: dateStr,
          time: document.getElementById('evTime').value || "00:00",
          location: document.getElementById('evLocation').value.trim() || "Location TBA",
          imgUrl: imgUrl,
          desc: document.getElementById('evDesc').value.trim() || "Join us for this special occasion."
        };

        const events = loadEvents();
        events.push(newEv);
        
        try {
          localStorage.setItem(EVENTS_KEY, JSON.stringify(events));
        } catch(e) {
          alert("Storage limit exceeded. Try uploading a smaller image or clearing other data.");
          btn.innerText = 'Broadcast Event';
          return;
        }
        
        btn.innerText = 'Broadcast Event';
        closeEventModal();
        renderEvents();
      };

      if (fileInput.files && fileInput.files[0]) {
        btn.innerText = 'Compressing...';
        compressAndSaveImage(fileInput.files[0], finalizeSave);
      } else {
        finalizeSave(""); // No image
      }
    }

    renderEvents();
  </script>
</body>
</html>
