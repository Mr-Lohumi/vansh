<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vansh (वंश) — Family Dynasty</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&family=Outfit:wght@300..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/shared.css?v=100">
  <style>
    /* ── TOOLBAR ── */
    .tree-toolbar {
      display: flex; align-items: center; justify-content: space-between; gap: 24px;
      padding: 22px 48px; border: 1px solid var(--gold-dark); border-radius: 20px 20px 0 0;
      background: linear-gradient(180deg, #3a0a10, #1a0508); position: relative;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5); z-index: 10;
    }
    .tree-toolbar::before, .tree-toolbar::after {
      content: ''; position: absolute; left: 0; right: 0; height: 8px;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='40' height='8' viewBox='0 0 40 8'><path d='M0 4 Q5 0 10 4 T20 4 T30 4 T40 4' stroke='%23d4af37' stroke-width='0.7' fill='none' opacity='0.85'/><circle cx='10' cy='4' r='0.9' fill='%23f4d772'/><circle cx='20' cy='4' r='0.9' fill='%23f4d772'/><circle cx='30' cy='4' r='0.9' fill='%23f4d772'/></svg>");
      background-repeat: repeat-x; background-size: 40px 8px;
    }
    .tree-toolbar::before { top: 4px; }
    .tree-toolbar::after  { bottom: 4px; }

    #perspectiveSelect option { background: #2a0608; color: #fbf3dd; font-family: 'Outfit', sans-serif; }
    
    .toolbar-left { display: flex; align-items: center; gap: 18px; }
    .perspective-label { font-family: 'Cinzel', serif; font-weight: 600; font-size: 15px; letter-spacing: 0.22em; color: var(--gold-bright); text-shadow: 0 1px 2px rgba(0,0,0,0.6); }
    
    .add-member {
      position: relative; display: inline-flex; align-items: center; gap: 10px; padding: 14px 28px;
      font-family: 'Cinzel', serif; font-weight: 600; font-size: 15px; letter-spacing: 0.18em;
      color: var(--gold-bright); background: linear-gradient(180deg, rgba(180, 40, 50, 0.5), rgba(92, 20, 24, 0.85)), radial-gradient(ellipse at 30% 30%, rgba(255, 200, 200, 0.25), transparent 60%);
      border: 2px solid var(--gold); border-radius: 14px; cursor: pointer;
      text-shadow: 0 1px 2px rgba(0,0,0,0.65);
      box-shadow: inset 0 1px 0 rgba(255, 220, 180, 0.25), inset 0 -2px 6px rgba(0,0,0,0.45), 0 0 0 1px var(--gold-dark), 0 6px 20px rgba(0,0,0,0.5), 0 0 24px rgba(228, 60, 80, 0.25);
    }

    /* ── TREE WRAPPER ── */
    .tree-wrapper {
      background: radial-gradient(ellipse 80% 60% at 70% 50%, rgba(200, 145, 60, 0.35) 0%, transparent 55%), radial-gradient(ellipse 60% 80% at 15% 30%, rgba(60, 10, 14, 0.6) 0%, transparent 60%), linear-gradient(135deg, var(--maroon-dark) 0%, var(--maroon) 50%, var(--maroon-deepest) 100%);
      border: 1px solid var(--gold-dark); border-top: none; border-radius: 0 0 20px 20px;
      padding: 60px 40px; overflow: hidden; position: relative;
      min-height: 620px; box-shadow: inset 0 0 40px rgba(0,0,0,0.8);
    }
    
    .bg-arches { position: absolute; inset: 0; pointer-events: none; z-index: 0; opacity: 0.6; width: 100%; height: 100%; }

    /* ── PREMIUM MODAL ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 500; display: none; align-items: center; justify-content: center; backdrop-filter: blur(6px); }
    .modal-overlay.active { display: flex; }
    .modal-box {
      background: var(--bg-card); border-radius: 24px; width: 90%; max-width: 560px;
      box-shadow: 0 24px 80px rgba(107,21,34,0.18), 0 0 0 1px rgba(212,175,55,0.1);
      border: 1px solid var(--border); max-height: 92vh; overflow-y: auto;
      animation: modal-in 0.35s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes modal-in { from { opacity:0; transform:scale(0.94) translateY(12px); } to { opacity:1; transform:none; } }
    .modal-hd {
      padding: 24px 28px 20px;
      background: linear-gradient(135deg, var(--royal-red-dark) 0%, #AB2330 100%);
      border-radius: 22px 22px 0 0; display: flex; align-items: center; justify-content: space-between;
    }
    .modal-hd-title { font-family: 'Cinzel', serif; font-size: 20px; font-weight: 700; color: #fff; }
    .modal-hd-sub { font-size: 12px; color: rgba(255,255,255,0.65); margin-top: 3px; }
    .modal-close-btn { background: rgba(255,255,255,0.12); border: none; color: #fff; width: 32px; height: 32px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; flex-shrink: 0; }
    .modal-close-btn:hover { background: rgba(255,255,255,0.25); }
    .modal-body { padding: 24px 28px; }

    /* ── FORM ELEMENTS ── */
    .form-section { margin-bottom: 20px; }
    .form-section-title { font-family: 'Cinzel', serif; font-size: 11px; font-weight: 700; color: var(--royal-red); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .form-section-title::after { content: ''; flex: 1; height: 1px; background: rgba(107,21,34,0.1); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    .form-group { margin-bottom: 16px; }
    .form-group:last-child { margin-bottom: 0; }
    .form-label { display: block; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); margin-bottom: 7px; }
    .form-input, .form-select {
      width: 100%; padding: 12px 14px; background: var(--bg-elevated);
      border: 1.5px solid var(--border); border-radius: 10px;
      color: var(--text); font-family: inherit; font-size: 14px;
      transition: all 0.25s; appearance: none;
    }
    .form-input:focus, .form-select:focus { outline: none; border-color: var(--royal-red); background: #fff; box-shadow: 0 0 0 3px rgba(107,21,34,0.08); }
    .form-input::placeholder { color: #BDB0A0; }

    /* ── VERIFICATION TOGGLE ── */
    .verify-toggle { display: flex; gap: 10px; margin-bottom: 24px; }
    .verify-option {
      flex: 1; padding: 14px 12px; border: 2px solid var(--border); border-radius: 12px;
      cursor: pointer; text-align: center; transition: all 0.25s; background: var(--bg-elevated);
    }
    .verify-option.selected-verified { border-color: #059669; background: rgba(5,150,105,0.06); }
    .verify-option.selected-unverified { border-color: var(--royal-red); background: rgba(107,21,34,0.06); }
    .vo-icon { font-size: 24px; margin-bottom: 6px; }
    .vo-label { font-size: 11px; font-weight: 700; font-family: 'Cinzel', serif; letter-spacing: 0.5px; }
    .vo-sub { font-size: 10px; color: var(--text-muted); margin-top: 3px; line-height: 1.4; }

    /* ── MODAL FOOTER ── */
    .modal-footer { padding: 16px 28px 24px; display: flex; gap: 12px; justify-content: flex-end; border-top: 1px solid var(--border-light); }
    .btn-cancel { padding: 12px 24px; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 10px; font-family: inherit; font-size: 13px; font-weight: 600; color: var(--text); cursor: pointer; transition: all 0.2s; }
    .btn-cancel:hover { background: var(--bg-card); }
    .btn-add { padding: 12px 28px; background: linear-gradient(135deg, var(--royal-red-dark), #AB2330); border: none; border-radius: 10px; font-family: 'Cinzel', serif; font-size: 13px; font-weight: 700; color: #fff; cursor: pointer; transition: all 0.25s; letter-spacing: 0.5px; display: flex; align-items: center; gap: 8px; }
    .btn-add:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(107,21,34,0.3); }

    /* ── SUCCESS ANIMATION ── */
    @keyframes successPop { 0%,100% { transform:scale(1); } 50% { transform:scale(1.06); } }
    .success-pop { animation: successPop 0.4s ease; }

    @media (max-width: 600px) { .form-row, .form-row-3 { grid-template-columns: 1fr; } .tree-toolbar { flex-direction: column; align-items: flex-start; } }
  </style>
</head>
<body style="display:none;">
  <script>
    if (!localStorage.getItem('rootd_auth')) {
      window.location.href = 'login.html';
      throw new Error('Not authenticated');
    }
    document.body.style.display = '';
  </script>

  <div class="app-shell">
    <div class="sidebar-wrapper" id="sidebar"></div>
    <div class="main-area">
      <header class="topbar" id="topbar"></header>
      <div class="page-content stack">

        <!-- Toolbar -->
        <div class="tree-toolbar anim">
          <div class="toolbar-left">
            <svg class="eye-icon" style="width:22px; height:22px; color:var(--gold-bright); filter:drop-shadow(0 0 4px rgba(212, 175, 55, 0.5));" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>
            <span class="perspective-label">PERSPECTIVE:</span>
            <select class="form-select" id="perspectiveSelect" style="background:linear-gradient(180deg, rgba(0,0,0,0.45), rgba(0,0,0,0.25)); border:1px solid var(--gold-dark); border-radius:8px; padding:10px 18px; color:var(--cream-light); font-family:'Outfit', serif; font-size:18px; font-weight:500; min-width:300px; box-shadow:inset 0 1px 0 rgba(212,175,55,0.18), inset 0 -1px 0 rgba(0,0,0,0.4); outline:none;"></select>
          </div>
          <button class="add-member" onclick="openAddModal()">
            <span class="plus">+</span><span>ADD MEMBER</span>
          </button>
        </div>

        <!-- Tree canvas -->
        <div class="tree-wrapper anim anim-delay-1" id="treeContainer" style="position: relative; overflow: auto; -webkit-overflow-scrolling: touch;">
          <svg class="bg-arches" viewBox="0 0 1600 1000" preserveAspectRatio="xMaxYMid slice" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <pattern id="filigree" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse"><g stroke="#d4af37" stroke-width="0.6" fill="none" opacity="0.9"><path d="M25 4 Q35 14 25 24 Q15 14 25 4 Z"/><path d="M25 26 Q35 36 25 46 Q15 36 25 26 Z"/><path d="M4 25 Q14 15 24 25 Q14 35 4 25 Z"/><path d="M26 25 Q36 15 46 25 Q36 35 26 25 Z"/><circle cx="25" cy="25" r="3"/><circle cx="25" cy="25" r="1" fill="#f4d772"/></g><g stroke="#a07418" stroke-width="0.3" fill="none" opacity="0.6"><path d="M0 0 Q12 12 25 0 M0 50 Q12 38 25 50 M50 0 Q38 12 50 25 M0 25 Q12 38 0 50"/></g></pattern>
              <pattern id="filigreeDense" x="0" y="0" width="35" height="35" patternUnits="userSpaceOnUse"><g stroke="#c39530" stroke-width="0.4" fill="none" opacity="0.85"><path d="M17 3 Q24 10 17 17 Q10 10 17 3 Z"/><path d="M17 18 Q24 25 17 32 Q10 25 17 18 Z"/><path d="M3 17 Q10 10 17 17 Q10 24 3 17 Z"/><path d="M18 17 Q25 10 32 17 Q25 24 18 17 Z"/><circle cx="17" cy="17" r="0.8" fill="#f4d772"/></g></pattern>
              <linearGradient id="archGrad" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#f4d772" stop-opacity="1"/><stop offset="60%" stop-color="#d4af37" stop-opacity="0.75"/><stop offset="100%" stop-color="#8b6914" stop-opacity="0.45"/></linearGradient>
              <linearGradient id="archFill" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#c89a3a" stop-opacity="0.55"/><stop offset="100%" stop-color="#7a5612" stop-opacity="0.25"/></linearGradient>
            </defs>
            <rect x="700" y="100" width="900" height="900" fill="url(#archFill)" opacity="0.35"/>
            <g stroke="url(#archGrad)" stroke-width="1.6" fill="url(#filigree)" opacity="0.95"><path d="M 850 1000 L 850 520 Q 850 240 1200 215 Q 1550 240 1550 520 L 1550 1000 Z"/></g>
            <g stroke="url(#archGrad)" stroke-width="1.4" fill="url(#filigreeDense)" opacity="0.9"><path d="M 950 1000 L 950 580 Q 950 340 1200 320 Q 1450 340 1450 580 L 1450 1000 Z"/></g>
            <g stroke="url(#archGrad)" stroke-width="1.2" fill="url(#filigree)" opacity="0.85"><path d="M 1060 1000 L 1060 640 Q 1060 430 1200 415 Q 1340 430 1340 640 L 1340 1000 Z"/></g>
            <g stroke="#d4af37" stroke-width="1.4" fill="none" opacity="0.7"><path d="M 850 1000 L 850 520 Q 850 240 1200 215 Q 1550 240 1550 520 L 1550 1000"/><path d="M 950 1000 L 950 580 Q 950 340 1200 320 Q 1450 340 1450 580 L 1450 1000"/><path d="M 1060 1000 L 1060 640 Q 1060 430 1200 415 Q 1340 430 1340 640 L 1340 1000"/></g>
            <g transform="translate(720 920)" opacity="0.55" stroke="#d4af37" stroke-width="1.2" fill="none"><circle r="55"/> <circle r="85"/> <circle r="20"/><g><path d="M0 -105 Q22 -65 0 -55 Q-22 -65 0 -105 Z" fill="rgba(212,175,55,0.15)"/><path d="M0 -105 Q22 -65 0 -55 Q-22 -65 0 -105 Z" fill="rgba(212,175,55,0.15)" transform="rotate(45)"/><path d="M0 -105 Q22 -65 0 -55 Q-22 -65 0 -105 Z" fill="rgba(212,175,55,0.15)" transform="rotate(90)"/><path d="M0 -105 Q22 -65 0 -55 Q-22 -65 0 -105 Z" fill="rgba(212,175,55,0.15)" transform="rotate(135)"/><path d="M0 -105 Q22 -65 0 -55 Q-22 -65 0 -105 Z" fill="rgba(212,175,55,0.15)" transform="rotate(180)"/><path d="M0 -105 Q22 -65 0 -55 Q-22 -65 0 -105 Z" fill="rgba(212,175,55,0.15)" transform="rotate(225)"/><path d="M0 -105 Q22 -65 0 -55 Q-22 -65 0 -105 Z" fill="rgba(212,175,55,0.15)" transform="rotate(270)"/><path d="M0 -105 Q22 -65 0 -55 Q-22 -65 0 -105 Z" fill="rgba(212,175,55,0.15)" transform="rotate(315)"/></g></g>
          </svg>

          <svg class="connections" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <filter id="royalNeonGlow" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="3" result="blur1" />
                <feGaussianBlur stdDeviation="8" result="blur2" />
                <feMerge><feMergeNode in="blur2" /><feMergeNode in="blur1" /><feMergeNode in="SourceGraphic" /></feMerge>
              </filter>
              <linearGradient id="liquidGoldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#ffd700" /><stop offset="50%" stop-color="#d4af37" /><stop offset="100%" stop-color="#b89047" />
              </linearGradient>
            </defs>
            <g id="conn-group"></g>
          </svg>

          <div id="dynamicTreeNodes" style="position:relative; z-index:2; min-width:max-content; min-height:max-content; display:inline-block; padding-bottom:80px;"></div>
        </div>

      </div>
    </div>
  </div>

  <!-- ═══════════════ ADD MEMBER MODAL ═══════════════ -->
  <div class="modal-overlay" id="addModalOverlay">
    <div class="modal-box">
      <!-- Header -->
      <div class="modal-hd">
        <div>
          <div class="modal-hd-title">Add Family Member</div>
          <div class="modal-hd-sub">Register a new member to your dynasty</div>
        </div>
        <button class="modal-close-btn" onclick="closeAddModal()">×</button>
      </div>

      <!-- Body -->
      <div class="modal-body">

        <!-- Section 1: Identity -->
        <div class="form-section">
          <div class="form-section-title">Identity</div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">First Name *</label>
              <input type="text" id="addFn" class="form-input" placeholder="e.g. Ramesh" required>
            </div>
            <div class="form-group">
              <label class="form-label">Last Name *</label>
              <input type="text" id="addLn" class="form-input" placeholder="e.g. Sharma">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Date of Birth</label>
              <input type="date" id="addDOB" class="form-input" max="" onchange="calcAddAge()">
            </div>
            <div class="form-group">
              <label class="form-label">Age <span id="addAgeDisplay" style="color:var(--royal-red);font-weight:700;"></span></label>
              <input type="number" id="addAge" class="form-input" placeholder="Years" min="0" max="120">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Gender</label>
              <select id="addGen" class="form-select">
                <option value="M">Male</option>
                <option value="F">Female</option>
                <option value="O">Other</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Occupation</label>
              <input type="text" id="addOccupation" class="form-input" placeholder="e.g. Farmer, Doctor">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group" style="flex:1;">
              <label class="form-label">Profile Photo <span style="color:var(--text-muted);font-weight:400;">(optional)</span></label>
              <div style="display:flex; align-items:center; gap:12px;">
                <div id="addAvatarPreview" style="width:54px;height:54px;border-radius:50%;background:var(--bg-elevated);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--text-muted);overflow:hidden;background-size:cover;background-position:center;">📷</div>
                <label style="flex:1;padding:10px 14px;border:1.5px dashed var(--border);border-radius:10px;cursor:pointer;font-size:13px;color:var(--text-muted);text-align:center;transition:all 0.2s;" onmouseover="this.style.borderColor='var(--royal-red)'" onmouseout="this.style.borderColor='var(--border)'">
                  Click to upload photo
                  <input type="file" id="addAvatarInput" accept="image/*" style="display:none;" onchange="handleAddAvatarUpload(event)">
                </label>
              </div>
            </div>
          </div>
        </div>

        <!-- Section 2: Dynasty -->
        <div class="form-section">
          <div class="form-section-title">Lineage Details</div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Gotra *</label>
              <select id="addGotra" class="form-select">
                <option value="Kashyap">Kashyap</option>
                <option value="Bharadwaj">Bharadwaj</option>
                <option value="Vashistha">Vashistha</option>
                <option value="Atri">Atri</option>
                <option value="Garg">Garg</option>
                <option value="Shandilya">Shandilya</option>
                <option value="Gautam">Gautam</option>
                <option value="Bhrigu">Bhrigu</option>
                <option value="Parashar">Parashar</option>
                <option value="Kaundinya">Kaundinya</option>
                <option value="Vishwamitra">Vishwamitra</option>
                <option value="Angirasa">Angirasa</option>
                <option value="Agastya">Agastya</option>
                <option value="Other">Other</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Caste</label>
              <select id="addCaste" class="form-select">
                <option value="Brahmin">Brahmin</option>
                <option value="Kshatriya">Kshatriya</option>
                <option value="Vaishya">Vaishya</option>
                <option value="Kayastha">Kayastha</option>
                <option value="Rajput">Rajput</option>
                <option value="Jat">Jat</option>
                <option value="Other">Other</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Native Place</label>
            <input type="text" id="addNative" class="form-input" placeholder="e.g. Uttarakhand, Delhi">
          </div>
        </div>

        <!-- Section 3: Relationship -->
        <div class="form-section">
          <div class="form-section-title">Family Connection</div>
          <div class="form-group">
            <label class="form-label">Relationship to You *</label>
            <select id="addRelation" class="form-select" onchange="onRelationChange(this.value)">
              <option value="">— Select Relation —</option>
              <optgroup label="Direct Family">
                <option value="father">Father</option>
                <option value="mother">Mother</option>
                <option value="son">Son</option>
                <option value="daughter">Daughter</option>
                <option value="brother">Brother</option>
                <option value="sister">Sister</option>
                <option value="husband">Husband</option>
                <option value="wife">Wife</option>
              </optgroup>
              <optgroup label="Grandparents">
                <option value="dada">Dada (Father's Father)</option>
                <option value="dadi">Dadi (Father's Mother)</option>
                <option value="nana">Nana (Mother's Father)</option>
                <option value="nani">Nani (Mother's Mother)</option>
              </optgroup>
              <optgroup label="Paternal Uncles / Aunts">
                <option value="chacha">Chacha (Father's Brother)</option>
                <option value="chachi">Chachi (Chacha's Wife)</option>
                <option value="bua">Bua (Father's Sister)</option>
                <option value="phupha">Phupha (Bua's Husband)</option>
              </optgroup>
              <optgroup label="Maternal Uncles / Aunts">
                <option value="mama">Mama (Mother's Brother)</option>
                <option value="mami">Mami (Mama's Wife)</option>
                <option value="mausi">Mausi (Mother's Sister)</option>
                <option value="mausa">Mausa (Mausi's Husband)</option>
              </optgroup>
              <optgroup label="Cousins">
                <option value="cousin_brother_pat">Cousin Brother (paternal)</option>
                <option value="cousin_sister_pat">Cousin Sister (paternal)</option>
                <option value="cousin_brother_mat">Cousin Brother (maternal)</option>
                <option value="cousin_sister_mat">Cousin Sister (maternal)</option>
              </optgroup>
              <optgroup label="Nieces / Nephews">
                <option value="bhatija">Bhatija (Brother's Son)</option>
                <option value="bhatiji">Bhatiji (Brother's Daughter)</option>
                <option value="bhanja">Bhanja (Sister's Son)</option>
                <option value="bhanji">Bhanji (Sister's Daughter)</option>
              </optgroup>
              <optgroup label="In-Laws">
                <option value="sasur">Sasur (Father-in-law)</option>
                <option value="saas">Saas (Mother-in-law)</option>
                <option value="saala">Saala (Wife's Brother)</option>
                <option value="saali">Saali (Wife's Sister)</option>
                <option value="devar_jeth">Devar / Jeth (Husband's Brother)</option>
                <option value="nanad">Nanad (Husband's Sister)</option>
                <option value="bahu">Bahu (Son's Wife)</option>
                <option value="damaad">Damaad (Daughter's Husband)</option>
              </optgroup>
            </select>
          </div>
          <div id="addRelationContext" style="display:none; margin-top:16px; padding:12px; background:rgba(212,175,55,0.05); border:1px dashed var(--gold); border-radius:8px;">
            <!-- Dynamic Context (prerequisite warnings or selection dropdowns) injected here -->
          </div>
          <!-- Hidden inputs for legacy compatibility -->
          <input type="hidden" id="addParent" value="">
          <input type="hidden" id="addSpouse" value="">
        </div>

        <!-- Section 4: Verification Status -->
        <div class="form-section">
          <div class="form-section-title">Verification Status</div>
          <div class="verify-toggle">
            <div class="verify-option selected-verified" id="voVerified" onclick="selectVerification(true)">
              <div class="vo-icon">✅</div>
              <div class="vo-label" style="color:#059669;">Verified</div>
              <div class="vo-sub">Member confirmed in the dynasty. Gold tick shown on profile.</div>
            </div>
            <div class="verify-option" id="voUnverified" onclick="selectVerification(false)">
              <div class="vo-icon">🔴</div>
              <div class="vo-label" style="color:var(--royal-red);">Unverified</div>
              <div class="vo-sub">Added for tree reference. Needs identity confirmation later.</div>
            </div>
          </div>
          <input type="hidden" id="addVerified" value="true">
        </div>

      </div>

      <!-- Footer -->
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeAddModal()">Cancel</button>
        <button class="btn-add" onclick="submitAddMember()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
          Add to Dynasty
        </button>
      </div>
    </div>
  </div>

  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js?v=27"></script>
  <script src="js/shared-auth.js?v=27"></script>
  <script src="js/shared-data.js?v=27"></script>
  <script src="js/shared-nav.js?v=27"></script>
  <script src="js/shared-tree.js?v=27"></script>
  <script>
    if (!requireAuth()) throw '';
    initNav('tree');

    const params = new URLSearchParams(location.search);
    let currentPOV = params.get('id') || getAuthData()?.userId || familyMembers[0]?.id;

    // Set DOB max to today
    document.getElementById('addDOB').max = new Date().toISOString().split('T')[0];

    const pSelect = document.getElementById('perspectiveSelect');

    function populateDropdowns() {
      pSelect.innerHTML = '';
      const parentSelect = document.getElementById('addParent');
      const spouseSelect = document.getElementById('addSpouse');
      parentSelect.innerHTML = '<option value="">None</option>';
      spouseSelect.innerHTML = '<option value="">None</option>';

      familyMembers.forEach(m => {
        const name = getFullName(m);
        pSelect.innerHTML   += `<option value="${m.id}" ${m.id === currentPOV ? 'selected' : ''}>${name}</option>`;
        parentSelect.innerHTML += `<option value="${m.id}">${name}</option>`;
        if (!m.spouse) spouseSelect.innerHTML += `<option value="${m.id}">${name}</option>`;
      });
    }
    populateDropdowns();

    pSelect.addEventListener('change', (e) => {
      currentPOV = e.target.value;
      renderTreeToContainer('dynamicTreeNodes', 'treeCanvas', currentPOV, 'handleNodeClick');
    });

    function handleNodeClick(id) {
      currentPOV = id;
      pSelect.value = id;
      renderTreeToContainer('dynamicTreeNodes', 'treeCanvas', currentPOV, 'handleNodeClick');
    }

    window.addEventListener('resize', () => {
      drawTreeConnections('dynamicTreeNodes', 'treeCanvas', getBloodlineNetwork(currentPOV), currentPOV);
    });

    renderTreeToContainer('dynamicTreeNodes', 'treeCanvas', currentPOV, 'handleNodeClick');
    refreshMembersFromCloud().then(() => {
      renderTreeToContainer('dynamicTreeNodes', 'treeCanvas', currentPOV, 'handleNodeClick');
    });

    // ── Modal open/close ──
    function openAddModal() {
      document.getElementById('addModalOverlay').classList.add('active');
    }
    function openAddModalWithPreselect(relationVal, relatedToId) {
      document.getElementById('addRelation').value = relationVal;
      onRelationChange(relationVal);
      // If it opened an ambiguous selection dropdown, select the target!
      setTimeout(() => {
         const ambig = document.getElementById('addAmbiguousSelection');
         if (ambig && relatedToId) ambig.value = relatedToId;
      }, 50);
      openAddModal();
    }
    function closeAddModal() {
      document.getElementById('addModalOverlay').classList.remove('active');
      document.getElementById('addFn').value = '';
      document.getElementById('addLn').value = '';
      document.getElementById('addDOB').value = '';
      document.getElementById('addAge').value = '';
      document.getElementById('addAgeDisplay').textContent = '';
      document.getElementById('addOccupation').value = '';
      document.getElementById('addNative').value = '';
      document.getElementById('addRelation').value = '';
      selectVerification(true);
    }

    // ── Auto-calculate age from DOB ──
    function calcAddAge() {
      const dob = document.getElementById('addDOB').value;
      if (!dob) return;
      const birth = new Date(dob);
      const today = new Date();
      let age = today.getFullYear() - birth.getFullYear();
      const m = today.getMonth() - birth.getMonth();
      if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) age--;
      age = Math.max(0, age);
      document.getElementById('addAge').value = age;
      document.getElementById('addAgeDisplay').textContent = '(' + age + ' yrs)';
    }

    // ── Relation change: auto-suggest context ──
    function onRelationChange(val) {
      const auth = getAuthData();
      const myId = auth ? auth.userId : null;
      if (!myId || !val) {
         document.getElementById('addRelationContext').style.display = 'none';
         return;
      }
      
      const ctxContainer = document.getElementById('addRelationContext');
      if (typeof checkRelationPrerequisites === 'function') {
         const result = checkRelationPrerequisites(myId, val);
         if (result.status === 'missing') {
             ctxContainer.style.display = 'block';
             ctxContainer.innerHTML = `
                 <div style="font-size:13px; color:var(--royal-red); font-weight:600; font-family:'Outfit', sans-serif;">
                     ⚠️ Please add your ${result.missingLabel} first.
                 </div>
                 <button type="button" class="fc-btn" style="margin-top:8px;" onclick="document.getElementById('addRelation').value='${result.quickAddVal}'; onRelationChange('${result.quickAddVal}');">
                     + Add ${result.missingLabel}
                 </button>
             `;
         } else if (result.status === 'ambiguous') {
             ctxContainer.style.display = 'block';
             let opts = result.options.map(o => `<option value="${o.id}">${o.label}</option>`).join('');
             ctxContainer.innerHTML = `
                 <div style="font-size:12px; color:var(--text); font-weight:600; margin-bottom:6px; font-family:'Outfit', sans-serif;">
                     ${result.message}
                 </div>
                 <select id="addAmbiguousSelection" class="form-select" style="background:#fff;">
                     ${opts}
                 </select>
             `;
         } else {
             ctxContainer.style.display = 'none';
             ctxContainer.innerHTML = '';
         }
      }
    }

    // ── Verification toggle ──
    function selectVerification(isVerified) {
      document.getElementById('addVerified').value = isVerified ? 'true' : 'false';
      const vEl = document.getElementById('voVerified');
      const uEl = document.getElementById('voUnverified');
      if (isVerified) {
        vEl.className = 'verify-option selected-verified';
        uEl.className = 'verify-option';
      } else {
        vEl.className = 'verify-option';
        uEl.className = 'verify-option selected-unverified';
      }
    }

    // ── Submit add member ──
    function submitAddMember() {
      const fn       = document.getElementById('addFn').value.trim();
      const ln       = document.getElementById('addLn').value.trim();
      const relation = document.getElementById('addRelation').value;

      if (!fn || !ln) { alert('First Name and Last Name are required.'); return; }
      if (!relation)  { alert('Please select the relationship to you.'); return; }

      const age      = parseInt(document.getElementById('addAge').value) || 0;
      const dob      = document.getElementById('addDOB').value;
      const gender   = document.getElementById('addGen').value;
      const gotra    = document.getElementById('addGotra').value;
      const caste    = document.getElementById('addCaste').value;
      const native   = document.getElementById('addNative').value.trim();
      const occ      = document.getElementById('addOccupation').value.trim();
      const verified = document.getElementById('addVerified').value === 'true';
      const imageUrl = window._addMemberAvatarData || '';

      const ambiguousSelect = document.getElementById('addAmbiguousSelection');
      const auth = getAuthData();
      const relatedTo = ambiguousSelect ? ambiguousSelect.value : (auth ? auth.userId : null);

      addFamilyMember({
        firstName:   fn,
        lastName:    ln,
        gender:      gender,
        age:         age,
        dob:         dob,
        gotra:       gotra,
        caste:       caste,
        nativePlace: native,
        occupation:  occ || 'Family Member',
        verified:    verified,
        relation:    relation,
        relatedTo:   relatedTo,
        imageUrl:    imageUrl,
        bio:         verified ? 'Dynasty member — verified.' : 'Dynasty member — awaiting verification.',
      });

      closeAddModal();

      const verLabel = verified ? '✅ Verified' : '🔴 Unverified';
      if (typeof showToast === 'function') {
        showToast('Member Added', `${fn} ${ln} joined as ${relation} · ${verLabel}`, verified ? 'ok' : 'warn');
      }

      window._addMemberAvatarData = '';
      document.getElementById('addAvatarPreview').style.backgroundImage = '';
      document.getElementById('addAvatarPreview').innerHTML = '📷';
      document.getElementById('addAvatarInput').value = '';

      populateDropdowns();
      renderTreeToContainer('dynamicTreeNodes', 'treeCanvas', currentPOV, 'handleNodeClick');
    }

    function handleAddAvatarUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        window._addMemberAvatarData = e.target.result;
        const preview = document.getElementById('addAvatarPreview');
        preview.style.backgroundImage = `url('${e.target.result}')`;
        preview.innerHTML = '';
      };
      reader.readAsDataURL(file);
    }
  </script>
</body>
</html>
