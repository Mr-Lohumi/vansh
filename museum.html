<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vansh (वंश) — Royal Heritage Museum</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&family=Outfit:wght@300..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/shared.css?v=100">
  <style>
    body { background-color: var(--bg-body); }
    .main-area { background: transparent; }

    .museum-header-card { 
      padding: 50px 40px; 
      background: var(--bg-card);
      border: 1px solid var(--border); 
      border-radius: 20px;
      margin-bottom: 40px; 
      position: relative;
      display: flex; justify-content: space-between; align-items: center;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(107,21,34,0.08);
    }
    .museum-header-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--royal-red-dark), var(--gold), var(--royal-red-dark)); }

    /* Intricate Corner SVGs - recolored to match gold */
    .ornament { position: absolute; width: 140px; height: 140px; opacity: 0.15; pointer-events: none; }
    .ornament-tl { top: -10px; left: -10px; background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 100" fill="none" stroke="%23D4AF37" stroke-width="1.5"><path d="M10 50 Q 50 50 50 10 M10 40 Q 40 40 40 10 M10 30 Q 30 30 30 10 M10 60 Q 60 60 60 10" /><circle cx="20" cy="20" r="4"/><path d="M0 0 L100 100" stroke-width="0.5"/></svg>') no-repeat; }
    .ornament-tr { top: -10px; right: -10px; background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 100" fill="none" stroke="%23D4AF37" stroke-width="1.5"><path d="M90 50 Q 50 50 50 10 M90 40 Q 60 40 60 10 M90 30 Q 70 30 70 10 M90 60 Q 40 60 40 10" /><circle cx="80" cy="20" r="4"/><path d="M100 0 L0 100" stroke-width="0.5"/></svg>') no-repeat; }
    .ornament-bl { bottom: -10px; left: -10px; background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 100" fill="none" stroke="%23D4AF37" stroke-width="1.5"><path d="M10 50 Q 50 50 50 90 M10 60 Q 40 60 40 90 M10 70 Q 30 70 30 90 M10 40 Q 60 40 60 90" /><circle cx="20" cy="80" r="4"/><path d="M0 100 L100 0" stroke-width="0.5"/></svg>') no-repeat; }
    .ornament-br { bottom: -10px; right: -10px; background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 100" fill="none" stroke="%23D4AF37" stroke-width="1.5"><path d="M90 50 Q 50 50 50 90 M90 60 Q 60 60 60 90 M90 70 Q 70 70 70 90 M90 40 Q 40 40 40 90" /><circle cx="80" cy="80" r="4"/><path d="M100 100 L0 0" stroke-width="0.5"/></svg>') no-repeat; }

    .museum-header-text { z-index: 2; position: relative; }
    .museum-header-text h1 { 
      font-size: 38px; font-weight: 800; font-family: 'Cinzel', serif; color: var(--text); 
      margin-bottom: 12px; text-transform: uppercase; letter-spacing: 2px;
    }
    .museum-header-text p { font-size: 15px; color: var(--text-secondary); letter-spacing: 0.5px; max-width: 600px; line-height: 1.6; font-weight: 400;}

    .btn-royal {
      background: linear-gradient(135deg, var(--royal-red-dark), #AB2330); color: #fff; 
      border: none;
      font-family: 'Cinzel', serif; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
      padding: 14px 28px; border-radius: 12px; cursor: pointer; transition: 0.3s;
      box-shadow: 0 4px 15px rgba(107, 21, 34, 0.3); 
      z-index: 2; position: relative;
      display: flex; align-items: center; gap: 10px; font-size: 13px;
    }
    .btn-royal:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(107, 21, 34, 0.4); }

    .collections-section {
      background: transparent;
      padding: 0;
      border: none;
    }
    
    .collections-title {
      font-family: 'Cinzel', serif; font-size: 20px; font-weight: 800; color: var(--text);
      margin-bottom: 24px; letter-spacing: 1px; text-transform: uppercase;
      display: flex; align-items: center; gap: 10px;
    }
    .collections-title::after { content: ''; flex: 1; height: 1px; background: var(--border-light); }

    .museum-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
    
    .museum-frame {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      position: relative;
      transition: all 0.4s ease;
      box-shadow: 0 4px 12px rgba(107,21,34,0.04);
      z-index: 1;
      overflow: hidden;
      display: flex; flex-direction: column;
    }
    .museum-frame:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(107, 21, 34, 0.15); border-color: rgba(107,21,34,0.25); }

    .museum-img-wrapper {
      padding: 0; position: relative; z-index: 4; border-bottom: 1px solid var(--border-light);
    }
    .museum-img { 
      width: 100%; height: 280px; background-size: cover; background-position: center; 
    }
    
    .museum-plaque {
      padding: 24px;
      text-align: center;
      position: relative; z-index: 4; flex: 1;
      background: var(--bg-card);
    }

    .museum-tag { display: inline-block; color: var(--gold); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; padding: 4px 12px; border: 1px solid rgba(212,175,55,0.3); border-radius: 12px; background: rgba(212,175,55,0.05); }
    .museum-title { font-family: 'Cinzel', serif; font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .museum-year { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 12px; font-family: 'Outfit', sans-serif; text-transform: uppercase; letter-spacing: 1px; }
    .museum-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
    
    .btn-remove-art {
      position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
      color: #fff; border: 1px solid rgba(255,255,255,0.2); border-radius: 50%;
      width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 10; opacity: 0; transition: 0.3s; font-size: 14px; font-weight: bold;
    }
    .museum-frame:hover .btn-remove-art { opacity: 1; }
    .btn-remove-art:hover { background: var(--royal-red); border-color: transparent; transform: scale(1.1); }

    /* Modal Styles */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px); z-index: 1000; display: none; align-items: center; justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal-box {
      background: var(--bg-card);
      border: 1px solid var(--border); border-radius: 20px; width: 100%; max-width: 500px;
      padding: 32px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative;
    }
    .modal-box::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--royal-red-dark), var(--gold), var(--royal-red-dark)); border-radius: 20px 20px 0 0; }
    .modal-title { font-family: 'Cinzel', serif; font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 24px; text-transform: uppercase; letter-spacing: 2px; text-align: center;}
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; color: var(--text-secondary); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .form-input, .form-select {
      width: 100%; background: var(--bg-elevated); border: 1.5px solid transparent;
      color: var(--text); padding: 12px 16px; border-radius: 12px; font-family: inherit; font-size: 14px; transition: all 0.25s;
    }
    .form-input:focus, .form-select:focus { outline: none; border-color: var(--gold-border); box-shadow: 0 0 0 3px var(--gold-dim); background: #fff; color: #000; }
    .modal-close { position: absolute; top: 20px; right: 20px; background: none; border: none; color: var(--text-muted); font-size: 24px; cursor: pointer; }
    .modal-close:hover { color: var(--text); }
    .modal-footer { display: flex; justify-content: flex-end; gap: 16px; margin-top: 32px; }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="sidebar-wrapper" id="sidebar"></div>
    <div class="main-area">
      <header class="topbar" id="topbar"></header>
      <div class="page-content stack">
        
        <div class="museum-header-card anim">
          <div class="ornament ornament-tl"></div>
          <div class="ornament ornament-tr"></div>
          <div class="ornament ornament-bl"></div>
          <div class="ornament ornament-br"></div>
          <div class="museum-header-text">
            <h1 id="museumDynamicTitle">Heritage Museum</h1>
            <p>Welcome to the digital archive of your dynasty. Upload and preserve your sacred artifacts, historical documents, and royal portraits for all future generations.</p>
          </div>
          <button class="btn-royal" onclick="openUploadModal()">
            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
            + Add Artifact
          </button>
        </div>
        
        <div class="collections-section anim anim-delay-1">
          <div class="collections-title">Featured Collections</div>
          <div class="museum-grid" id="museumGrid">
            <!-- Dynamic Content -->
          </div>
        </div>
        
      </div>
    </div>
  </div>

  <!-- Upload Modal -->
  <div class="modal-overlay" id="uploadModal">
    <div class="modal-box">
      <button class="modal-close" onclick="closeUploadModal()">✕</button>
      <div class="modal-title">Deposit Artifact</div>
      
      <div class="form-group">
        <label class="form-label">Artifact Title</label>
        <input type="text" id="artTitle" class="form-input" placeholder="e.g. Ancestral Sword">
      </div>
      
      <div class="form-group">
        <label class="form-label">Type</label>
        <select id="artType" class="form-select">
          <option value="Artifact">Artifact</option>
          <option value="Document">Document</option>
          <option value="Photograph">Photograph</option>
          <option value="Heirloom">Heirloom</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Visibility</label>
        <select id="artVis" class="form-select">
          <option value="family">Everyone in family network</option>
          <option value="close">Close family only</option>
          <option value="me">Only me</option>
        </select>
      </div>
      
      <div class="form-group">
        <label class="form-label">Year / Era</label>
        <input type="text" id="artYear" class="form-input" placeholder="e.g. Circa 1950">
      </div>
      
      <div class="form-group">
        <label class="form-label">Upload Image</label>
        <input type="file" id="artFile" class="form-input" accept="image/*" style="padding: 9px 16px;">
        <div style="font-size:11px; color:rgba(255,255,255,0.5); margin-top:6px;">Select an image file from your device.</div>
      </div>
      
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea id="artDesc" class="form-input" rows="3" placeholder="Describe the historical significance..."></textarea>
      </div>
      
      <div class="modal-footer">
        <button class="btn" style="background:transparent; color:var(--royal-red); border:1px solid var(--royal-red)" onclick="closeUploadModal()">Cancel</button>
        <button class="btn-royal" id="saveArtBtn" onclick="saveArtifact()">Preserve in Museum</button>
      </div>
    </div>
  </div>

  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js?v=12"></script>
  <script src="js/shared-auth.js?v=12"></script>
  <script src="js/shared-data.js?v=12"></script>
  <script src="js/shared-nav.js?v=12"></script>
  <script>
    if (!requireAuth()) throw '';
    initNav('museum');

    // Make title dynamic
    const authData = getAuthData();
    const loggedInId = authData.userId;
    const params = new URLSearchParams(location.search);
    const targetId = params.get('id') || loggedInId;
    const targetUser = getMemberById(targetId);
    
    const tier = getRelationshipTier(loggedInId, targetId);
    if (tier === 'STRANGER') {
      document.querySelector('.page-content').innerHTML = '<div style="text-align:center;padding:60px">This museum is outside your family network. Access Denied.</div>';
      throw new Error('Access Denied');
    }

    if (targetUser && targetUser.firstName) {
      document.getElementById('museumDynamicTitle').innerText = targetUser.firstName + "'s Heritage Museum";
    }
    
    if (tier !== 'SELF') {
      const addBtn = document.querySelector('.museum-header-card .btn-royal');
      if (addBtn) addBtn.style.display = 'none';
    }

    const MUSEUM_KEY = 'vansh_museum_db';

    function loadMuseum() {
      let data = localStorage.getItem(MUSEUM_KEY);
      if (!data) {
        // Seed initial data if empty
        data = [
          {
            userId: loggedInId,
            title: "The First Homestead",
            type: "Photograph",
            visibility: "family",
            year: "Circa 1950",
            imgUrl: "https://images.unsplash.com/photo-1549420084-5f564f1c97a8?q=80&w=600&auto=format&fit=crop",
            desc: "The original family home built in the native village. This structure served as the gathering place for the first generation."
          },
          {
            userId: loggedInId,
            title: "Ancestral Land Deed",
            type: "Document",
            visibility: "close",
            year: "1971",
            imgUrl: "https://images.unsplash.com/photo-1579724128912-70b9ebef5a2e?q=80&w=600&auto=format&fit=crop",
            desc: "The original handwritten property deed registered during the early days, officially establishing the family estate."
          }
        ];
        localStorage.setItem(MUSEUM_KEY, JSON.stringify(data));
      } else {
        data = JSON.parse(data);
      }
      return data;
    }

    function renderMuseum() {
      let artifacts = loadMuseum();
      
      // Filter by targetId and visibility
      artifacts = artifacts.filter(art => {
        const owner = art.userId || loggedInId; // legacy support
        if (owner !== targetId) return false;
        
        if (tier === 'SELF') return true;
        if (art.visibility === 'me') return false;
        if (art.visibility === 'close' && tier !== 'CLOSE_FAMILY') return false;
        return true;
      });

      const grid = document.getElementById('museumGrid');
      
      if(artifacts.length === 0) {
        grid.innerHTML = '<div style="color:var(--text-muted); padding:20px;">The museum is currently empty.</div>';
        return;
      }

      grid.innerHTML = artifacts.map((art, idx) => `
        <div class="museum-frame">
          ${tier === 'SELF' ? `<button class="btn-remove-art" onclick="deleteArtifact('${art.id || idx}')" title="Remove Artifact">✕</button>` : ''}

          
          <div class="museum-img-wrapper">
            <div class="museum-img" style="background-image:url('${art.imgUrl || 'https://images.unsplash.com/photo-1505664194779-8beaceb93744?q=80&w=600&auto=format&fit=crop'}')"></div>
          </div>
          <div class="museum-plaque">
            <div class="museum-tag">${art.type}</div>
            <div class="museum-title">${art.title}</div>
            <div class="museum-year">${art.year}</div>
            <div class="museum-desc">${art.desc}</div>
          </div>
        </div>
      `).join('');
    }

    function deleteArtifact(idStr) {
      if(!confirm("Are you sure you want to permanently remove this artifact from the Royal Collection?")) return;
      const artifacts = loadMuseum();
      // find index
      let idx = typeof idStr === 'string' && idStr.startsWith('art_') ? artifacts.findIndex(a => a.id === idStr) : parseInt(idStr);
      if (idx > -1) {
        artifacts.splice(idx, 1);
        localStorage.setItem(MUSEUM_KEY, JSON.stringify(artifacts));
        renderMuseum();
      }
    }

    function openUploadModal() {
      document.getElementById('uploadModal').classList.add('active');
    }
    
    function closeUploadModal() {
      document.getElementById('uploadModal').classList.remove('active');
      // clear fields
      document.getElementById('artTitle').value = '';
      document.getElementById('artYear').value = '';
      document.getElementById('artFile').value = '';
      document.getElementById('artDesc').value = '';
    }

    function compressAndSaveImage(file, callback) {
      const reader = new FileReader();
      reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
          const canvas = document.createElement('canvas');
          const max_size = 800;
          let width = img.width;
          let height = img.height;
          
          if (width > height) {
            if (width > max_size) { height *= max_size / width; width = max_size; }
          } else {
            if (height > max_size) { width *= max_size / height; height = max_size; }
          }
          
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          
          const dataUrl = canvas.toDataURL('image/jpeg', 0.7); // compress to save localStorage space
          callback(dataUrl);
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    function saveArtifact() {
      const title = document.getElementById('artTitle').value.trim();
      if(!title) return alert("Title is required");

      const fileInput = document.getElementById('artFile');
      const btn = document.getElementById('saveArtBtn');
      
      const finalizeSave = (imgUrl) => {
        const newArt = {
          id: 'art_' + Date.now(),
          userId: loggedInId,
          title: title,
          type: document.getElementById('artType').value,
          visibility: document.getElementById('artVis').value,
          year: document.getElementById('artYear').value.trim() || 'Unknown',
          imgUrl: imgUrl,
          desc: document.getElementById('artDesc').value.trim() || 'No description provided.'
        };

        const artifacts = loadMuseum();
        artifacts.unshift(newArt); // add to top
        
        try {
          localStorage.setItem(MUSEUM_KEY, JSON.stringify(artifacts));
        } catch(e) {
          alert("Storage limit exceeded. Try uploading a smaller image or clearing other data.");
          btn.innerText = 'Preserve in Museum';
          return;
        }
        
        btn.innerText = 'Preserve in Museum';
        closeUploadModal();
        renderMuseum();
      };

      if (fileInput.files && fileInput.files[0]) {
        btn.innerText = 'Compressing...';
        compressAndSaveImage(fileInput.files[0], finalizeSave);
      } else {
        // Default image if none uploaded
        finalizeSave("https://images.unsplash.com/photo-1505664194779-8beaceb93744?q=80&w=600&auto=format&fit=crop");
      }
    }

    renderMuseum();
  </script>
</body>
</html>
