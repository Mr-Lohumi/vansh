<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vansh (वंश) — Royal Heritage Museum</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/shared.css?v=6">
  <style>
    /* Premium Indian Wedding Theme */
  <style>
    /* Exact Museum Image Replication */
    .museum-body { 
      background-color: #f6f3eb; 
      background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png');
    }
    .main-area { background: transparent; }

    .museum-header-card { 
      padding: 50px 40px; 
      background: #fdfbf7;
      border: 1px solid #d4c297; 
      border-radius: 4px;
      margin-bottom: 40px; 
      position: relative;
      display: flex; justify-content: space-between; align-items: center;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.03);
    }
    
    /* Intricate Corner SVGs */
    .ornament { position: absolute; width: 140px; height: 140px; opacity: 0.5; pointer-events: none; }
    .ornament-tl { top: -10px; left: -10px; background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 100" fill="none" stroke="%23d4c297" stroke-width="1.5"><path d="M10 50 Q 50 50 50 10 M10 40 Q 40 40 40 10 M10 30 Q 30 30 30 10 M10 60 Q 60 60 60 10" /><circle cx="20" cy="20" r="4"/><path d="M0 0 L100 100" stroke-width="0.5"/></svg>') no-repeat; }
    .ornament-tr { top: -10px; right: -10px; background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 100" fill="none" stroke="%23d4c297" stroke-width="1.5"><path d="M90 50 Q 50 50 50 10 M90 40 Q 60 40 60 10 M90 30 Q 70 30 70 10 M90 60 Q 40 60 40 10" /><circle cx="80" cy="20" r="4"/><path d="M100 0 L0 100" stroke-width="0.5"/></svg>') no-repeat; }
    .ornament-bl { bottom: -10px; left: -10px; background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 100" fill="none" stroke="%23d4c297" stroke-width="1.5"><path d="M10 50 Q 50 50 50 90 M10 60 Q 40 60 40 90 M10 70 Q 30 70 30 90 M10 40 Q 60 40 60 90" /><circle cx="20" cy="80" r="4"/><path d="M0 100 L100 0" stroke-width="0.5"/></svg>') no-repeat; }
    .ornament-br { bottom: -10px; right: -10px; background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 100" fill="none" stroke="%23d4c297" stroke-width="1.5"><path d="M90 50 Q 50 50 50 90 M90 60 Q 60 60 60 90 M90 70 Q 70 70 70 90 M90 40 Q 40 40 40 90" /><circle cx="80" cy="80" r="4"/><path d="M100 100 L0 0" stroke-width="0.5"/></svg>') no-repeat; }

    .museum-header-text { z-index: 2; position: relative; }
    .museum-header-text h1 { 
      font-size: 46px; font-weight: 800; font-family: 'Cinzel', serif; color: #6e1b2f; 
      margin-bottom: 16px; text-transform: uppercase; letter-spacing: 2px;
    }
    .museum-header-text p { font-size: 17px; color: #333; letter-spacing: 0.5px; max-width: 650px; line-height: 1.6; font-weight: 500;}

    .btn-royal {
      background: linear-gradient(135deg, #4c111e, #6e1b2f); color: #d4c297; 
      border: 2px solid #b59f63;
      font-family: 'Cinzel', serif; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
      padding: 16px 32px; border-radius: 8px; cursor: pointer; transition: 0.3s;
      box-shadow: 0 8px 20px rgba(110, 27, 47, 0.4), inset 0 0 10px rgba(255,255,255,0.1); 
      z-index: 2; position: relative;
      display: flex; align-items: center; gap: 10px; font-size: 15px;
    }
    .btn-royal:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(110, 27, 47, 0.5); border-color: #d4c297; color: #fff;}

    .collections-section {
      background: #fdfbf7;
      border: 1px solid #d4c297;
      border-radius: 6px;
      padding: 40px;
    }
    
    .collections-title {
      font-family: 'Cinzel', serif; font-size: 20px; font-weight: 800; color: #222;
      margin-bottom: 30px; letter-spacing: 1px; text-transform: uppercase;
    }

    .museum-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 40px; }
    
    .museum-frame {
      background: #fdfbf7;
      padding: 8px;
      border: 3px solid #6e1b2f;
      border-radius: 4px;
      position: relative;
      transition: transform 0.4s ease;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      z-index: 1;
    }
    
    /* The ornate corner loops exactly like the image */
    .frame-loop { position: absolute; width: 24px; height: 24px; border: 3px solid #6e1b2f; border-radius: 50%; background: #fdfbf7; z-index: 2; }
    .loop-tl { top: -12px; left: -12px; }
    .loop-tr { top: -12px; right: -12px; }
    .loop-bl { bottom: -12px; left: -12px; }
    .loop-br { bottom: -12px; right: -12px; }

    /* The inner gold line inside the maroon border */
    .museum-frame::before {
      content: ''; position: absolute; inset: 4px; border: 1px solid #d4c297; pointer-events: none; z-index: 3;
    }

    .museum-frame:hover { transform: translateY(-6px); box-shadow: 0 20px 40px rgba(110, 27, 47, 0.15); }
    
    .museum-img-wrapper {
      padding: 16px; background: transparent; position: relative; z-index: 4;
    }

    .museum-img { 
      width: 100%; height: 260px; background-size: cover; background-position: center; 
      border: 2px solid #d4c297; box-shadow: 0 0 0 2px #fdfbf7, 0 0 0 4px #d4c297;
    }
    
    .museum-plaque {
      padding: 24px 16px 16px;
      text-align: center;
      position: relative; z-index: 4;
    }

    .museum-tag { display: inline-block; color: #6e1b2f; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
    .museum-title { font-family: 'Cinzel', serif; font-size: 22px; font-weight: 800; color: #1a1a1a; margin-bottom: 6px; }
    .museum-year { font-size: 13px; font-weight: 700; color: #666; margin-bottom: 12px; font-family: 'Inter', sans-serif; text-transform: uppercase; letter-spacing: 1px; }
    .museum-desc { font-size: 14px; color: #444; line-height: 1.6; }
    
    .btn-remove-art {
      position: absolute; top: 12px; right: 12px; background: #fdfbf7;
      color: #6e1b2f; border: 2px solid #6e1b2f; border-radius: 50%;
      width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 10; opacity: 0; transition: 0.3s; font-size: 14px; font-weight: bold;
    }
    .museum-frame:hover .btn-remove-art { opacity: 1; }
    .btn-remove-art:hover { background: #6e1b2f; color: #d4c297; transform: scale(1.1); }

    /* Modal Styles */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6);
      backdrop-filter: blur(5px); z-index: 1000; display: none; align-items: center; justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal-box {
      background: #fdfbf7;
      border: 2px solid #d4c297; border-radius: 8px; width: 100%; max-width: 500px;
      padding: 32px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); position: relative;
    }
    .modal-title { font-family: 'Cinzel', serif; font-size: 24px; color: #6e1b2f; margin-bottom: 24px; text-transform: uppercase; letter-spacing: 2px; text-align: center;}
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; color: #555; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .form-input, .form-select {
      width: 100%; background: #fff; border: 1px solid #d4c297;
      color: #333; padding: 12px 16px; border-radius: 4px; font-family: 'Inter', sans-serif;
    }
    .form-input:focus, .form-select:focus { outline: none; border-color: #6e1b2f; box-shadow: 0 0 10px rgba(110, 27, 47, 0.1); }
    .modal-close { position: absolute; top: 20px; right: 20px; background: none; border: none; color: #999; font-size: 24px; cursor: pointer; }
    .modal-close:hover { color: #333; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 16px; margin-top: 32px; }
  </style>
</head>
<body class="museum-body">
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-area">
      <header class="topbar" id="topbar"></header>
      <div class="page-content">
        
        <div class="museum-header-card anim">
          <div class="ornament ornament-tl"></div>
          <div class="ornament ornament-tr"></div>
          <div class="ornament ornament-bl"></div>
          <div class="ornament ornament-br"></div>
          <div class="museum-header-text">
            <h1 id="museumDynamicTitle">Heritage Museum</h1>
            <p>Welcome to the digital archive of your dynasty. Upload and preserve your sacred artifacts, historical documents, and royal portraits for all future generations.</p>
          </div>
          <button class="btn-royal" onclick="openUploadModal()">
            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
            + Add Artifact
          </button>
        </div>
        
        <div class="collections-section anim anim-delay-1">
          <div class="collections-title">Featured Collections</div>
          <div class="museum-grid" id="museumGrid">
            <!-- Dynamic Content -->
          </div>
        </div>
        
      </div>
    </div>
  </div>

  <!-- Upload Modal -->
  <div class="modal-overlay" id="uploadModal">
    <div class="modal-box">
      <button class="modal-close" onclick="closeUploadModal()">✕</button>
      <div class="modal-title">Deposit Artifact</div>
      
      <div class="form-group">
        <label class="form-label">Artifact Title</label>
        <input type="text" id="artTitle" class="form-input" placeholder="e.g. Ancestral Sword">
      </div>
      
      <div class="form-group">
        <label class="form-label">Type</label>
        <select id="artType" class="form-select">
          <option value="Artifact">Artifact</option>
          <option value="Document">Document</option>
          <option value="Photograph">Photograph</option>
          <option value="Heirloom">Heirloom</option>
        </select>
      </div>
      
      <div class="form-group">
        <label class="form-label">Year / Era</label>
        <input type="text" id="artYear" class="form-input" placeholder="e.g. Circa 1950">
      </div>
      
      <div class="form-group">
        <label class="form-label">Upload Image</label>
        <input type="file" id="artFile" class="form-input" accept="image/*" style="padding: 9px 16px;">
        <div style="font-size:11px; color:rgba(255,255,255,0.5); margin-top:6px;">Select an image file from your device.</div>
      </div>
      
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea id="artDesc" class="form-input" rows="3" placeholder="Describe the historical significance..."></textarea>
      </div>
      
      <div class="modal-footer">
        <button class="btn" style="background:transparent; color:var(--royal-red); border:1px solid var(--royal-red)" onclick="closeUploadModal()">Cancel</button>
        <button class="btn-royal" id="saveArtBtn" onclick="saveArtifact()">Preserve in Museum</button>
      </div>
    </div>
  </div>

  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js?v=12"></script>
  <script src="js/shared-auth.js?v=12"></script>
  <script src="js/shared-data.js?v=12"></script>
  <script src="js/shared-nav.js?v=12"></script>
  <script>
    if (!requireAuth()) throw '';
    initNav('museum');

    // Make title dynamic
    const authData = getAuthData();
    const currentUser = getMemberById(authData.userId);
    if (currentUser && currentUser.firstName) {
      document.getElementById('museumDynamicTitle').innerText = currentUser.firstName + "'s Heritage Museum";
    }

    const MUSEUM_KEY = 'vansh_museum_db';

    function loadMuseum() {
      let data = localStorage.getItem(MUSEUM_KEY);
      if (!data) {
        // Seed initial data if empty
        data = [
          {
            title: "The First Homestead",
            type: "Photograph",
            year: "Circa 1950",
            imgUrl: "https://images.unsplash.com/photo-1549420084-5f564f1c97a8?q=80&w=600&auto=format&fit=crop",
            desc: "The original family home built in the native village. This structure served as the gathering place for the first generation."
          },
          {
            title: "Ancestral Land Deed",
            type: "Document",
            year: "1971",
            imgUrl: "https://images.unsplash.com/photo-1579724128912-70b9ebef5a2e?q=80&w=600&auto=format&fit=crop",
            desc: "The original handwritten property deed registered during the early days, officially establishing the family estate."
          }
        ];
        localStorage.setItem(MUSEUM_KEY, JSON.stringify(data));
      } else {
        data = JSON.parse(data);
      }
      return data;
    }

    function renderMuseum() {
      const artifacts = loadMuseum();
      const grid = document.getElementById('museumGrid');
      
      if(artifacts.length === 0) {
        grid.innerHTML = '<div style="color:var(--text-muted); padding:20px;">The museum is currently empty. Upload your first artifact to begin the archive.</div>';
        return;
      }

      grid.innerHTML = artifacts.map((art, idx) => `
        <div class="museum-frame">
          <button class="btn-remove-art" onclick="deleteArtifact(${idx})" title="Remove Artifact">✕</button>
          <div class="frame-loop loop-tl"></div>
          <div class="frame-loop loop-tr"></div>
          <div class="frame-loop loop-bl"></div>
          <div class="frame-loop loop-br"></div>
          
          <div class="museum-img-wrapper">
            <div class="museum-img" style="background-image:url('${art.imgUrl || 'https://images.unsplash.com/photo-1505664194779-8beaceb93744?q=80&w=600&auto=format&fit=crop'}')"></div>
          </div>
          <div class="museum-plaque">
            <div class="museum-tag">${art.type}</div>
            <div class="museum-title">${art.title}</div>
            <div class="museum-year">${art.year}</div>
            <div class="museum-desc">${art.desc}</div>
          </div>
        </div>
      `).join('');
    }

    function deleteArtifact(index) {
      if(!confirm("Are you sure you want to permanently remove this artifact from the Royal Collection?")) return;
      const artifacts = loadMuseum();
      artifacts.splice(index, 1);
      localStorage.setItem(MUSEUM_KEY, JSON.stringify(artifacts));
      renderMuseum();
    }

    function openUploadModal() {
      document.getElementById('uploadModal').classList.add('active');
    }
    
    function closeUploadModal() {
      document.getElementById('uploadModal').classList.remove('active');
      // clear fields
      document.getElementById('artTitle').value = '';
      document.getElementById('artYear').value = '';
      document.getElementById('artFile').value = '';
      document.getElementById('artDesc').value = '';
    }

    function compressAndSaveImage(file, callback) {
      const reader = new FileReader();
      reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
          const canvas = document.createElement('canvas');
          const max_size = 800;
          let width = img.width;
          let height = img.height;
          
          if (width > height) {
            if (width > max_size) { height *= max_size / width; width = max_size; }
          } else {
            if (height > max_size) { width *= max_size / height; height = max_size; }
          }
          
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          
          const dataUrl = canvas.toDataURL('image/jpeg', 0.7); // compress to save localStorage space
          callback(dataUrl);
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    function saveArtifact() {
      const title = document.getElementById('artTitle').value.trim();
      if(!title) return alert("Title is required");

      const fileInput = document.getElementById('artFile');
      const btn = document.getElementById('saveArtBtn');
      
      const finalizeSave = (imgUrl) => {
        const newArt = {
          title: title,
          type: document.getElementById('artType').value,
          year: document.getElementById('artYear').value.trim() || 'Unknown',
          imgUrl: imgUrl,
          desc: document.getElementById('artDesc').value.trim() || 'No description provided.'
        };

        const artifacts = loadMuseum();
        artifacts.unshift(newArt); // add to top
        
        try {
          localStorage.setItem(MUSEUM_KEY, JSON.stringify(artifacts));
        } catch(e) {
          alert("Storage limit exceeded. Try uploading a smaller image or clearing other data.");
          btn.innerText = 'Preserve in Museum';
          return;
        }
        
        btn.innerText = 'Preserve in Museum';
        closeUploadModal();
        renderMuseum();
      };

      if (fileInput.files && fileInput.files[0]) {
        btn.innerText = 'Compressing...';
        compressAndSaveImage(fileInput.files[0], finalizeSave);
      } else {
        // Default image if none uploaded
        finalizeSave("https://images.unsplash.com/photo-1505664194779-8beaceb93744?q=80&w=600&auto=format&fit=crop");
      }
    }

    renderMuseum();
  </script>
</body>
</html>
