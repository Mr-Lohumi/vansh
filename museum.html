<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vansh (वंश) — Royal Heritage Museum</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/shared.css?v=6">
  <style>
    /* Premium Indian Wedding Theme */
    /* Premium Ornate Museum Theme based on Reference Image */
    .museum-body {
      background-color: #f7f3e8; /* Creamy background from image */
    }

    .museum-header-card { 
      padding: 50px 40px; 
      background: #fdfbf7;
      border: 1px solid #dccb96; /* Gold/brass border */
      margin-bottom: 40px; 
      position: relative;
      display: flex; justify-content: space-between; align-items: center;
    }
    
    /* Corner Ornaments for Header */
    .ornament { position: absolute; width: 120px; height: 120px; opacity: 0.6; pointer-events: none; }
    .ornament-tl { top: 0; left: 0; background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M0 0h100c-30 0-60 10-80 30S0 70 0 100z" fill="none" stroke="%23dccb96" stroke-width="2"/><circle cx="20" cy="20" r="4" fill="none" stroke="%23dccb96" stroke-width="2"/></svg>') no-repeat top left; background-size: contain; }
    .ornament-tr { top: 0; right: 0; background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M100 0H0c30 0 60 10 80 30s20 40 20 70z" fill="none" stroke="%23dccb96" stroke-width="2"/><circle cx="80" cy="20" r="4" fill="none" stroke="%23dccb96" stroke-width="2"/></svg>') no-repeat top right; background-size: contain; }
    .ornament-bl { bottom: 0; left: 0; background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M0 100h100c-30 0-60-10-80-30S0 30 0 0z" fill="none" stroke="%23dccb96" stroke-width="2"/><circle cx="20" cy="80" r="4" fill="none" stroke="%23dccb96" stroke-width="2"/></svg>') no-repeat bottom left; background-size: contain; }
    .ornament-br { bottom: 0; right: 0; background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M100 100H0c30 0 60-10 80-30s20-40 20-70z" fill="none" stroke="%23dccb96" stroke-width="2"/><circle cx="80" cy="80" r="4" fill="none" stroke="%23dccb96" stroke-width="2"/></svg>') no-repeat bottom right; background-size: contain; }

    .museum-header-text { z-index: 2; position: relative; }
    .museum-header-text h1 { 
      font-size: 42px; font-weight: 800; font-family: 'Cinzel', serif; color: #5a101d; /* Deep maroon */
      margin-bottom: 12px; text-transform: uppercase; letter-spacing: 2px;
    }
    .museum-header-text p { font-size: 16px; color: #333; letter-spacing: 0.5px; max-width: 600px; line-height: 1.6; font-weight: 500;}

    .btn-royal {
      background: linear-gradient(to right, #4a0d17, #751424); color: #e9d5a1; border: 2px solid #c8a96d;
      font-family: 'Cinzel', serif; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
      padding: 12px 24px; border-radius: 8px; cursor: pointer; transition: 0.3s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 2; position: relative;
      display: flex; align-items: center; gap: 8px;
    }
    .btn-royal:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); color: #fff; border-color: #e9d5a1; }

    .collections-section {
      background: #fdfbf7;
      border: 1px solid #dccb96;
      border-radius: 8px;
      padding: 40px;
    }
    
    .collections-title {
      font-family: 'Cinzel', serif; font-size: 20px; font-weight: 700; color: #1a1a1a;
      margin-bottom: 30px; letter-spacing: 2px; text-transform: uppercase;
    }

    .museum-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 40px; }
    
    .museum-frame {
      background: #fdfbf7;
      padding: 12px;
      border: 4px solid #5a101d; /* Maroon outer border */
      border-radius: 8px;
      position: relative;
      transition: transform 0.4s ease;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }
    
    /* Decorative corners on the frame */
    .museum-frame::before {
      content: ''; position: absolute; inset: -4px; border: 1px solid #5a101d; pointer-events: none; border-radius: 10px;
    }
    .museum-frame-corner { position: absolute; width: 30px; height: 30px; pointer-events: none; }
    .mfc-tl { top: -2px; left: -2px; border-top: 4px solid #5a101d; border-left: 4px solid #5a101d; border-top-left-radius: 12px; }
    .mfc-tr { top: -2px; right: -2px; border-top: 4px solid #5a101d; border-right: 4px solid #5a101d; border-top-right-radius: 12px; }
    .mfc-bl { bottom: -2px; left: -2px; border-bottom: 4px solid #5a101d; border-left: 4px solid #5a101d; border-bottom-left-radius: 12px; }
    .mfc-br { bottom: -2px; right: -2px; border-bottom: 4px solid #5a101d; border-right: 4px solid #5a101d; border-bottom-right-radius: 12px; }

    .museum-frame:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
    
    .museum-img-wrapper {
      border: 1px solid #dccb96;
      padding: 8px; background: #fdfbf7;
      border-radius: 4px;
    }

    .museum-img { 
      width: 100%; height: 240px; background-size: cover; background-position: center; 
      border: 1px solid #e0d8c3;
    }
    
    .museum-plaque {
      padding: 20px 10px 10px;
      text-align: center;
    }

    .museum-tag { display: inline-block; color: #5a101d; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
    .museum-title { font-family: 'Cinzel', serif; font-size: 20px; font-weight: 800; color: #1a1a1a; margin-bottom: 6px; }
    .museum-year { font-size: 13px; font-weight: 700; color: #666; margin-bottom: 8px; font-family: 'Inter', sans-serif; text-transform: uppercase; letter-spacing: 1px; }
    .museum-desc { font-size: 14px; color: #444; line-height: 1.6; }

    /* Modal Styles */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5);
      backdrop-filter: blur(5px); z-index: 1000; display: none; align-items: center; justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal-box {
      background: var(--bg-card);
      border: 1px solid var(--border); border-radius: 12px; width: 100%; max-width: 500px;
      padding: 32px; box-shadow: var(--shadow-hover); position: relative;
    }
    .modal-title { font-family: 'Cinzel', serif; font-size: 24px; color: var(--royal-red); margin-bottom: 24px; text-transform: uppercase; letter-spacing: 2px; text-align: center;}
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; color: var(--text-muted); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .form-input, .form-select {
      width: 100%; background: var(--bg-elevated); border: 1px solid var(--border);
      color: var(--text); padding: 12px 16px; border-radius: 6px; font-family: 'Inter', sans-serif;
    }
    .form-input:focus, .form-select:focus { outline: none; border-color: var(--royal-red); box-shadow: 0 0 10px var(--royal-red-glow); }
    .modal-close { position: absolute; top: 20px; right: 20px; background: none; border: none; color: var(--text-muted); font-size: 24px; cursor: pointer; }
    .modal-close:hover { color: var(--text); }
    .modal-footer { display: flex; justify-content: flex-end; gap: 16px; margin-top: 32px; }
  </style>
</head>
<body class="museum-body">
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-area">
      <header class="topbar" id="topbar"></header>
      <div class="page-content">
        
        <div class="museum-header-card anim">
          <div class="ornament ornament-tl"></div>
          <div class="ornament ornament-tr"></div>
          <div class="ornament ornament-bl"></div>
          <div class="ornament ornament-br"></div>
          <div class="museum-header-text">
            <h1 id="museumDynamicTitle">Heritage Museum</h1>
            <p>Welcome to the digital archive of your dynasty. Upload and preserve your sacred artifacts, historical documents, and royal portraits for all future generations.</p>
          </div>
          <button class="btn-royal" onclick="openUploadModal()">
            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
            + Add Artifact
          </button>
        </div>
        
        <div class="collections-section anim anim-delay-1">
          <div class="collections-title">Featured Collections</div>
          <div class="museum-grid" id="museumGrid">
            <!-- Dynamic Content -->
          </div>
        </div>
        
      </div>
    </div>
  </div>

  <!-- Upload Modal -->
  <div class="modal-overlay" id="uploadModal">
    <div class="modal-box">
      <button class="modal-close" onclick="closeUploadModal()">✕</button>
      <div class="modal-title">Deposit Artifact</div>
      
      <div class="form-group">
        <label class="form-label">Artifact Title</label>
        <input type="text" id="artTitle" class="form-input" placeholder="e.g. Ancestral Sword">
      </div>
      
      <div class="form-group">
        <label class="form-label">Type</label>
        <select id="artType" class="form-select">
          <option value="Artifact">Artifact</option>
          <option value="Document">Document</option>
          <option value="Photograph">Photograph</option>
          <option value="Heirloom">Heirloom</option>
        </select>
      </div>
      
      <div class="form-group">
        <label class="form-label">Year / Era</label>
        <input type="text" id="artYear" class="form-input" placeholder="e.g. Circa 1950">
      </div>
      
      <div class="form-group">
        <label class="form-label">Upload Image</label>
        <input type="file" id="artFile" class="form-input" accept="image/*" style="padding: 9px 16px;">
        <div style="font-size:11px; color:rgba(255,255,255,0.5); margin-top:6px;">Select an image file from your device.</div>
      </div>
      
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea id="artDesc" class="form-input" rows="3" placeholder="Describe the historical significance..."></textarea>
      </div>
      
      <div class="modal-footer">
        <button class="btn" style="background:transparent; color:var(--royal-red); border:1px solid var(--royal-red)" onclick="closeUploadModal()">Cancel</button>
        <button class="btn-royal" id="saveArtBtn" onclick="saveArtifact()">Preserve in Museum</button>
      </div>
    </div>
  </div>

  <script src="js/shared-auth.js"></script>
  <script src="js/shared-data.js"></script>
  <script src="js/shared-nav.js"></script>
  <script>
    if (!requireAuth()) throw '';
    initNav('museum');

    // Make title dynamic
    const authData = getAuthData();
    const currentUser = getMemberById(authData.userId);
    if (currentUser && currentUser.firstName) {
      document.getElementById('museumDynamicTitle').innerText = currentUser.firstName + "'s Heritage Museum";
    }

    const MUSEUM_KEY = 'vansh_museum_db';

    function loadMuseum() {
      let data = localStorage.getItem(MUSEUM_KEY);
      if (!data) {
        // Seed initial data if empty
        data = [
          {
            title: "The First Homestead",
            type: "Photograph",
            year: "Circa 1950",
            imgUrl: "https://images.unsplash.com/photo-1549420084-5f564f1c97a8?q=80&w=600&auto=format&fit=crop",
            desc: "The original family home built in the native village. This structure served as the gathering place for the first generation."
          },
          {
            title: "Ancestral Land Deed",
            type: "Document",
            year: "1971",
            imgUrl: "https://images.unsplash.com/photo-1579724128912-70b9ebef5a2e?q=80&w=600&auto=format&fit=crop",
            desc: "The original handwritten property deed registered during the early days, officially establishing the family estate."
          }
        ];
        localStorage.setItem(MUSEUM_KEY, JSON.stringify(data));
      } else {
        data = JSON.parse(data);
      }
      return data;
    }

    function renderMuseum() {
      const artifacts = loadMuseum();
      const grid = document.getElementById('museumGrid');
      
      if(artifacts.length === 0) {
        grid.innerHTML = '<div style="color:var(--text-muted); padding:20px;">The museum is currently empty. Upload your first artifact to begin the archive.</div>';
        return;
      }

      grid.innerHTML = artifacts.map(art => `
        <div class="museum-frame">
          <div class="museum-frame-corner mfc-tl"></div>
          <div class="museum-frame-corner mfc-tr"></div>
          <div class="museum-frame-corner mfc-bl"></div>
          <div class="museum-frame-corner mfc-br"></div>
          
          <div class="museum-img-wrapper">
            <div class="museum-img" style="background-image:url('${art.imgUrl || 'https://images.unsplash.com/photo-1505664194779-8beaceb93744?q=80&w=600&auto=format&fit=crop'}')"></div>
          </div>
          <div class="museum-plaque">
            <div class="museum-tag">${art.type}</div>
            <div class="museum-title">${art.title}</div>
            <div class="museum-year">${art.year}</div>
            <div class="museum-desc">${art.desc}</div>
          </div>
        </div>
      `).join('');
    }

    function openUploadModal() {
      document.getElementById('uploadModal').classList.add('active');
    }
    
    function closeUploadModal() {
      document.getElementById('uploadModal').classList.remove('active');
      // clear fields
      document.getElementById('artTitle').value = '';
      document.getElementById('artYear').value = '';
      document.getElementById('artFile').value = '';
      document.getElementById('artDesc').value = '';
    }

    function compressAndSaveImage(file, callback) {
      const reader = new FileReader();
      reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
          const canvas = document.createElement('canvas');
          const max_size = 800;
          let width = img.width;
          let height = img.height;
          
          if (width > height) {
            if (width > max_size) { height *= max_size / width; width = max_size; }
          } else {
            if (height > max_size) { width *= max_size / height; height = max_size; }
          }
          
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          
          const dataUrl = canvas.toDataURL('image/jpeg', 0.7); // compress to save localStorage space
          callback(dataUrl);
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    function saveArtifact() {
      const title = document.getElementById('artTitle').value.trim();
      if(!title) return alert("Title is required");

      const fileInput = document.getElementById('artFile');
      const btn = document.getElementById('saveArtBtn');
      
      const finalizeSave = (imgUrl) => {
        const newArt = {
          title: title,
          type: document.getElementById('artType').value,
          year: document.getElementById('artYear').value.trim() || 'Unknown',
          imgUrl: imgUrl,
          desc: document.getElementById('artDesc').value.trim() || 'No description provided.'
        };

        const artifacts = loadMuseum();
        artifacts.unshift(newArt); // add to top
        
        try {
          localStorage.setItem(MUSEUM_KEY, JSON.stringify(artifacts));
        } catch(e) {
          alert("Storage limit exceeded. Try uploading a smaller image or clearing other data.");
          btn.innerText = 'Preserve in Museum';
          return;
        }
        
        btn.innerText = 'Preserve in Museum';
        closeUploadModal();
        renderMuseum();
      };

      if (fileInput.files && fileInput.files[0]) {
        btn.innerText = 'Compressing...';
        compressAndSaveImage(fileInput.files[0], finalizeSave);
      } else {
        // Default image if none uploaded
        finalizeSave("https://images.unsplash.com/photo-1505664194779-8beaceb93744?q=80&w=600&auto=format&fit=crop");
      }
    }

    renderMuseum();
  </script>
</body>
</html>
