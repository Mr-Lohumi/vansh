<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vansh (वंश) — Family Trust & Philanthropy</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/shared.css?v=100">
  <style>
    .trust-hero {
      background: linear-gradient(135deg, var(--bg-card), var(--bg-elevated));
      border: 1px solid var(--border); border-radius: var(--radius); padding: 48px;
      text-align: center; margin-bottom: 32px; box-shadow: var(--shadow-sm); position: relative; overflow: hidden;
    }
    .trust-title { font-family: 'Cinzel', serif; font-size: 32px; font-weight: 700; color: var(--royal-red); margin-bottom: 12px; }
    .trust-sub { font-size: 15px; color: var(--text-secondary); max-width: 600px; margin: 0 auto 32px; line-height: 1.6; }
    
    .goal-card { background: var(--bg-card); padding: 32px; border-radius: var(--radius); border: 1px solid var(--border); max-width: 500px; margin: 0 auto; box-shadow: var(--shadow-card); }
    .goal-top { display: flex; justify-content: space-between; margin-bottom: 16px; font-family: 'Cinzel', serif; font-weight: 700; }
    .goal-bar { height: 16px; background: var(--bg-hover); border-radius: 8px; overflow: hidden; margin-bottom: 16px; position: relative;}
    .goal-fill { background: var(--royal-red); height: 100%; border-radius: 8px; position: absolute; left: 0; top: 0;}
    .goal-btm { font-size: 12px; color: var(--text-muted); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
    
    .impact-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; margin-top: 40px;}
    .impact-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; text-align: center; transition: 0.3s; }
    .impact-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); border-color: var(--royal-red); }
    .ic-icon { font-size: 40px; margin-bottom: 16px; }
    .ic-title { font-family: 'Cinzel', serif; font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .ic-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 16px; }
    .ic-amt { font-size: 20px; font-weight: 700; color: var(--royal-red); font-family: 'Cormorant Garamond', sans-serif;}
  </style>
</head>
<body style="display: none;">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js?v=12"></script>
  <script src="js/shared-auth.js?v=12"></script>
  <script src="js/shared-data.js?v=12"></script>
  <script src="js/shared-nav.js?v=12"></script>
  <script>
    if (!localStorage.getItem('rootd_auth')) {
      window.location.href = 'login.html';
      throw new Error('Not authenticated');
    }
    document.body.style.display = '';
  </script>
  <div class="app-shell">
    <div class="sidebar-wrapper" id="sidebar"></div>
    <div class="main-area">
      <header class="topbar" id="topbar"></header>
      <div class="page-content stack">
        
        <div class="trust-hero anim">
          <div class="trust-title">The Sharma Legacy Trust</div>
          <div class="trust-sub">Established in 2015 to honor the vision of Rajesh Sharma. Dedicated to educational scholarships, community development, and heritage preservation.</div>
          
          <div class="goal-card">
            <div class="goal-top">
              <span>Annual Education Fund</span>
              <span style="color: var(--royal-red)">₹8.5L / ₹10L</span>
            </div>
            <div class="goal-bar">
              <div class="goal-fill" style="width: 85%"></div>
            </div>
            <div class="goal-btm">85% Funded for 2026</div>
            <button class="btn btn-gold btn-sm w-full mt-4" onclick="alert('Secure payment gateway initiated.')">Contribute to Trust</button>
          </div>
        </div>
        
        <div class="section-header anim anim-delay-1" style="display:flex; justify-content:space-between; align-items:center;">
          <span>Impact Areas</span>
          <button class="btn btn-outline btn-sm" onclick="openTrustModal()">+ Add Impact Area</button>
        </div>
        
        <div class="impact-grid anim anim-delay-2" id="impactGrid">
          <!-- Rendered via JS -->
        </div>
        
      </div>
    </div>
  </div>

  <!-- Trust Modal -->
  <div class="modal-overlay" id="trustModalOverlay">
    <div class="modal-box" style="max-width: 500px;">
      <div class="modal-header">
        <div class="modal-title" id="trustModalTitle">Add Impact Area</div>
        <button class="modal-close" onclick="closeTrustModal()">×</button>
      </div>
      <form id="trustForm" onsubmit="event.preventDefault(); saveTrustItem();">
        <div class="modal-body">
          <input type="hidden" id="trustId">
        <div class="form-group">
          <label class="form-label">Icon (Emoji)</label>
          <input type="text" id="trustIcon" class="form-input" placeholder="e.g. 🎓" required>
        </div>
        <div class="form-group">
          <label class="form-label">Title</label>
          <input type="text" id="trustTitle" class="form-input" placeholder="e.g. Vidyalaya Scholarships" required>
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea id="trustDesc" class="form-input" style="height:80px; resize:none;" required></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Impact Metric / Amount</label>
          <input type="text" id="trustAmount" class="form-input" placeholder="e.g. 12 Students Funded" required>
        </div>
        </div>
        <div class="modal-footer" style="display:flex; justify-content:space-between;">
          <button type="button" class="btn btn-outline" id="trustDeleteBtn" style="color:var(--royal-red); border-color:var(--royal-red); display:none;" onclick="deleteTrustItem()">Delete</button>
          <div style="display:flex; gap:16px; margin-left:auto;">
            <button type="button" class="btn btn-outline" onclick="closeTrustModal()">Cancel</button>
            <button type="submit" class="btn btn-gold">Save</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <style>
    /* Modal Styles */
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); z-index: 1000; display: none; align-items: center; justify-content: center; }
    .modal-overlay.active { display: flex; }
    .modal-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; width: 100%; padding: 32px; box-shadow: var(--shadow-hover); position: relative; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .modal-title { font-family: 'Cinzel', serif; font-size: 20px; color: var(--royal-red); text-transform: uppercase; font-weight: 700; }
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; color: var(--text-muted); font-size: 12px; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; }
    .form-input { width: 100%; background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text); padding: 12px 16px; border-radius: 6px; font-family: 'Cormorant Garamond', sans-serif; }
    .form-input:focus { outline: none; border-color: var(--royal-red); box-shadow: 0 0 10px var(--royal-red-glow); }
    .modal-close { background: none; border: none; color: var(--text-muted); font-size: 24px; cursor: pointer; }
    .modal-close:hover { color: var(--text); }
  </style>

  <script>
    if (!requireAuth()) throw '';
    initNav('trust');
    
    const authData = getAuthData();
    const currentUser = getMemberById(authData.userId);
    
    // Set dynamic headers
    if (currentUser) {
      document.querySelector('.trust-title').innerText = \`The \${currentUser.lastName || ''} Legacy Trust\`;
      document.querySelector('.trust-sub').innerText = \`Established to honor the vision of the \${currentUser.lastName || ''} ancestors. Dedicated to educational scholarships, community development, and heritage preservation.\`;
    }
    
    // CRUD Logic
    let trustItems = JSON.parse(localStorage.getItem('vansh_trust_items')) || [
      { id: 't1', icon: '🎓', title: 'Vidyalaya Scholarships', desc: 'Funding higher education for underprivileged students in our ancestral village.', amount: '12 Students Funded' },
      { id: 't2', icon: '🏥', title: 'Medical Relief Camp', desc: 'Annual free medical consultation camps held in rural districts.', amount: '500+ Patients Served' },
      { id: 't3', icon: '🏛️', title: 'Temple Restoration', desc: 'Contributing to the preservation of our ancestral deity temple.', amount: '₹5L Donated' }
    ];
    
    function renderTrustItems() {
      const grid = document.getElementById('impactGrid');
      grid.innerHTML = '';
      trustItems.forEach(item => {
        grid.innerHTML += \`
          <div class="impact-card" style="position:relative;">
            <button class="btn btn-outline btn-sm" style="position:absolute; top:12px; right:12px; padding:4px 8px; font-size:11px;" onclick="openTrustModal('\${item.id}')">Edit</button>
            <div class="ic-icon">\${item.icon}</div>
            <div class="ic-title">\${item.title}</div>
            <div class="ic-desc">\${item.desc}</div>
            <div class="ic-amt">\${item.amount}</div>
          </div>
        \`;
      });
    }
    
    function openTrustModal(id = null) {
      const modal = document.getElementById('trustModalOverlay');
      const deleteBtn = document.getElementById('trustDeleteBtn');
      document.getElementById('trustModalTitle').innerText = id ? 'Edit Impact Area' : 'Add Impact Area';
      
      if (id) {
        const item = trustItems.find(t => t.id === id);
        document.getElementById('trustId').value = item.id;
        document.getElementById('trustIcon').value = item.icon;
        document.getElementById('trustTitle').value = item.title;
        document.getElementById('trustDesc').value = item.desc;
        document.getElementById('trustAmount').value = item.amount;
        deleteBtn.style.display = 'block';
      } else {
        document.getElementById('trustForm').reset();
        document.getElementById('trustId').value = '';
        deleteBtn.style.display = 'none';
      }
      modal.classList.add('active');
    }
    
    function closeTrustModal() { document.getElementById('trustModalOverlay').classList.remove('active'); }
    
    function saveTrustItem() {
      const id = document.getElementById('trustId').value;
      const newItem = {
        id: id || 't_' + Date.now(),
        icon: document.getElementById('trustIcon').value,
        title: document.getElementById('trustTitle').value,
        desc: document.getElementById('trustDesc').value,
        amount: document.getElementById('trustAmount').value
      };
      
      if (id) {
        const idx = trustItems.findIndex(t => t.id === id);
        if (idx !== -1) trustItems[idx] = newItem;
      } else {
        trustItems.push(newItem);
      }
      
      localStorage.setItem('vansh_trust_items', JSON.stringify(trustItems));
      closeTrustModal();
      renderTrustItems();
    }
    
    function deleteTrustItem() {
      const id = document.getElementById('trustId').value;
      if (confirm('Are you sure you want to delete this impact area?')) {
        trustItems = trustItems.filter(t => t.id !== id);
        localStorage.setItem('vansh_trust_items', JSON.stringify(trustItems));
        closeTrustModal();
        renderTrustItems();
      }
    }
    
    // Initial Render
    renderTrustItems();
  </script>
</body>
</html>
