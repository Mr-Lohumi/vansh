<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vansh (वंश) — Traditions & Heirloom</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&family=Outfit:wght@300..700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/shared.css?v=100">
  <style>
    .book-layout {
      max-width: 900px; margin: 0 auto; background: var(--bg-card); border: 1px solid var(--border);
      box-shadow: var(--shadow-card); position: relative; border-radius: 4px; overflow: hidden;
    }
    .book-layout::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 40px;
      background: linear-gradient(to right, rgba(0,0,0,0.05), transparent);
      border-right: 1px solid rgba(0,0,0,0.03); pointer-events: none;
    }
    
    .book-header { text-align: center; padding: 60px 40px 40px; border-bottom: 1px solid var(--border); position: relative;}
    .bh-ornament { font-size: 24px; color: var(--royal-red); margin-bottom: 16px; }
    .bh-title { font-family: 'Cinzel', serif; font-size: 36px; font-weight: 800; color: var(--royal-red); letter-spacing: 2px; }
    .bh-sub { font-family: 'Cinzel', serif; font-style: italic; font-size: 18px; color: var(--text-muted); margin-top: 12px; }
    
    .btn-add {
      position: absolute; top: 30px; right: 40px;
      background: var(--royal-red); color: #fff; border: none;
      font-family: 'Cinzel', serif; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
      padding: 10px 20px; border-radius: 6px; cursor: pointer; transition: 0.3s; font-size: 13px;
    }
    .btn-add:hover { background: var(--royal-red-dark); transform: translateY(-2px); box-shadow: var(--shadow-sm); }

    .book-content { padding: 40px 60px 80px 80px; }
    
    .chapter { margin-bottom: 60px; }
    .chapter-title { font-family: 'Cinzel', serif; font-size: 24px; color: var(--royal-red); border-bottom: 2px solid var(--border); padding-bottom: 12px; margin-bottom: 30px; font-weight: 800;}
    
    .recipe-card { display: flex; gap: 32px; align-items: flex-start; margin-bottom: 40px; position: relative; padding: 24px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px;}
    .recipe-img { width: 220px; height: 260px; object-fit: cover; border-radius: 6px; border: 2px solid var(--border); box-shadow: var(--shadow-sm); }
    .recipe-body { flex: 1; }
    .recipe-name { font-family: 'Cinzel', serif; font-size: 22px; font-weight: 800; color: var(--text); margin-bottom: 8px; padding-right: 120px; }
    .recipe-meta { font-family: 'Cinzel', serif; font-style: italic; font-size: 15px; color: var(--text-muted); margin-bottom: 20px; }
    .recipe-text { font-size: 15px; line-height: 1.8; color: var(--text-secondary); white-space: pre-line;}
    
    .card-actions { position: absolute; top: 20px; right: 20px; display: flex; gap: 8px; }
    .btn-action { background: var(--bg-card); color: var(--text-muted); border: 1px solid var(--border); border-radius: 4px; padding: 6px 12px; cursor: pointer; font-size: 12px; font-weight: 600; text-transform: uppercase; transition: 0.2s;}
    .btn-action:hover { color: var(--royal-red); border-color: var(--royal-red); }
    
    /* Modal Styles */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5);
      backdrop-filter: blur(5px); z-index: 1000; display: none; align-items: center; justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal-box {
      background: var(--bg-card);
      border: 1px solid var(--border); border-radius: 12px; width: 100%; max-width: 550px;
      padding: 32px; box-shadow: var(--shadow-hover); position: relative; max-height: 90vh; overflow-y: auto;
    }
    .modal-title { font-family: 'Cinzel', serif; font-size: 24px; color: var(--royal-red); margin-bottom: 24px; text-transform: uppercase; letter-spacing: 2px; text-align: center; font-weight: 800;}
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; color: var(--text-muted); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .form-input, .form-select {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); padding: 12px 16px; border-radius: 6px; font-family: 'Outfit', sans-serif;
    }
    .form-input:focus, .form-select:focus { outline: none; border-color: var(--royal-red); }
    .modal-close { position: absolute; top: 20px; right: 20px; background: none; border: none; color: var(--text-muted); font-size: 24px; cursor: pointer; }
    .modal-close:hover { color: var(--text); }
    .modal-footer { display: flex; justify-content: flex-end; gap: 16px; margin-top: 32px; }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="sidebar-wrapper" id="sidebar"></div>
    <div class="main-area">
      <header class="topbar" id="topbar"></header>
      <div class="page-content stack">
        
        <div class="book-layout anim">
          <div class="book-header">
            <div class="bh-ornament">❦</div>
            <div class="bh-title">The Vansh Archive</div>
            <div class="bh-sub">Preserving the sacred traditions, rituals, and heirloom recipes of the lineage.</div>
            <button class="btn-add" onclick="openTraditionModal()">+ Add Tradition</button>
          </div>
          
          <div class="book-content" id="traditionsContent">
            <!-- Dynamic Content -->
          </div>
        </div>
        
      </div>
    </div>
  </div>

  <!-- Tradition Modal -->
  <div class="modal-overlay" id="traditionModal">
    <div class="modal-box">
      <button class="modal-close" onclick="closeTraditionModal()">✕</button>
      <div class="modal-title" id="modalTitle">Add to Archive</div>
      
      <input type="hidden" id="tId">
      
      <div class="form-group">
        <label class="form-label">Category</label>
        <select id="tCategory" class="form-select">
          <option value="Heirloom Recipes">Heirloom Recipes</option>
          <option value="Rituals & Protocols">Rituals & Protocols</option>
          <option value="Family Folklore">Family Folklore</option>
          <option value="Values & Principles">Values & Principles</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Visibility</label>
        <select id="tVis" class="form-select">
          <option value="family">Everyone in family network</option>
          <option value="close">Close family only</option>
          <option value="me">Only me</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Title</label>
        <input type="text" id="tTitle" class="form-input" placeholder="e.g. Savitri's Dal Makhani">
      </div>
      
      <div class="form-group">
        <label class="form-label">Origin / Meta Info</label>
        <input type="text" id="tMeta" class="form-input" placeholder="e.g. Passed down by Generation 1">
      </div>
      
      <div class="form-group">
        <label class="form-label">Upload Image (Optional)</label>
        <input type="file" id="tFile" class="form-input" accept="image/*" style="padding: 9px 16px;">
        <input type="hidden" id="tExistingImg">
      </div>
      
      <div class="form-group">
        <label class="form-label">Description / Instructions</label>
        <textarea id="tDesc" class="form-input" rows="6" placeholder="Document the complete tradition..."></textarea>
      </div>
      
      <div class="modal-footer">
        <button class="btn" style="background:transparent; color:var(--text-muted); border:1px solid var(--border)" onclick="closeTraditionModal()">Cancel</button>
        <button class="btn" style="background:var(--royal-red); color:#fff; border:none;" onclick="saveTradition()">Save Tradition</button>
      </div>
    </div>
  </div>

  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js?v=27"></script>
  <script src="js/shared-auth.js?v=27"></script>
  <script src="js/shared-data.js?v=27"></script>
  <script src="js/shared-nav.js?v=27"></script>
  <script>
    const TRADITIONS_KEY = 'vansh_traditions_v1';

    function loadTraditions() {
      try {
        const saved = localStorage.getItem(TRADITIONS_KEY);
        if (saved) return JSON.parse(saved);
      } catch(e) {}
      return [];
    }

    function openTraditionModal(id = null) {
      document.getElementById('tId').value = id || '';
      if (id) {
        document.getElementById('modalTitle').innerText = 'Edit Archive Item';
        const t = loadTraditions().find(x => x.id === id);
        if (t) {
          document.getElementById('tCategory').value = t.category;
          document.getElementById('tVis').value = t.visibility;
          document.getElementById('tTitle').value = t.title;
          document.getElementById('tMeta').value = t.meta;
          document.getElementById('tDesc').value = t.desc;
          document.getElementById('tExistingImg').value = t.imgUrl || '';
        }
      } else {
        document.getElementById('modalTitle').innerText = 'Add to Archive';
        document.getElementById('tCategory').value = 'Heirloom Recipes';
        document.getElementById('tVis').value = 'family';
        document.getElementById('tTitle').value = '';
        document.getElementById('tMeta').value = '';
        document.getElementById('tDesc').value = '';
        document.getElementById('tExistingImg').value = '';
      }
      document.getElementById('tFile').value = '';
      document.getElementById('traditionModal').classList.add('active');
    }

    function closeTraditionModal() {
      document.getElementById('traditionModal').classList.remove('active');
    }

    function compressAndSaveImage(file, callback) {
      const reader = new FileReader();
      reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
          const canvas = document.createElement('canvas');
          const max_size = 800;
          let width = img.width;
          let height = img.height;
          if (width > height) { if (width > max_size) { height *= max_size / width; width = max_size; } } 
          else { if (height > max_size) { width *= max_size / height; height = max_size; } }
          canvas.width = width; canvas.height = height;
          const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
          callback(canvas.toDataURL('image/jpeg', 0.7));
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    function saveTradition() {
      const id = document.getElementById('tId').value;
      const title = document.getElementById('tTitle').value.trim();
      const desc = document.getElementById('tDesc').value.trim();
      
      if(!title || !desc) return alert("Title and Description are required!");

      const fileInput = document.getElementById('tFile');
      const existingImg = document.getElementById('tExistingImg').value;
      
      const finalizeSave = (imgUrl) => {
        const auth = typeof getAuthData === 'function' ? getAuthData() : null;
        const loggedInId = auth ? auth.userId : 'unknown';

        const payload = {
          id: id || 'TRAD_' + Date.now(),
          owner_id: loggedInId,
          created_at: Date.now(),
          userId: loggedInId,
          category: document.getElementById('tCategory').value,
          visibility: document.getElementById('tVis').value,
          title: title,
          meta: document.getElementById('tMeta').value.trim(),
          desc: desc,
          imgUrl: imgUrl
        };

        let traditions = loadTraditions();
        if (id) {
          const idx = traditions.findIndex(t => t.id === id);
          if (idx !== -1) traditions[idx] = payload;
        } else {
          traditions.unshift(payload); // add new to top
        }
        
        try {
          localStorage.setItem(TRADITIONS_KEY, JSON.stringify(traditions));
        } catch(e) {
          alert("Storage limit exceeded. Please upload a smaller image.");
          return;
        }
        
        closeTraditionModal();
        renderTraditions();
      };

      if (fileInput.files && fileInput.files[0]) {
        compressAndSaveImage(fileInput.files[0], finalizeSave);
      } else {
        finalizeSave(existingImg);
      }
    }

    function deleteTradition(id) {
      if(!confirm("Permanently delete this tradition from the archive?")) return;
      let traditions = loadTraditions();
      traditions = traditions.filter(t => t.id !== id);
      localStorage.setItem(TRADITIONS_KEY, JSON.stringify(traditions));
      renderTraditions();
    }
    
    function editTradition(id) {
      openTraditionModal(id);
    }

    renderTraditions();
  </script>
</body>
</html>
