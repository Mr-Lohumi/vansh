<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vansh (वंश) — Royal Matchmaking</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/shared.css">
  <style>
    /* Premium Indian Wedding Theme */
    .match-hero {
      background-image: url('images/cover_pattern.png');
      background-size: cover;
      background-position: center;
      border-radius: var(--radius);
      margin-bottom: -40px; /* Overlap with filter panel */
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow-card);
      min-height: 280px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 40px;
    }
    
    .match-hero::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.65);
      z-index: 1;
    }

    .match-hero-content {
      position: relative;
      z-index: 2;
      padding-bottom: 30px;
    }

    .match-hero h1 { 
      font-size: 42px; 
      font-weight: 800; 
      color: #fff; 
      margin-bottom: 12px; 
      text-transform: uppercase;
      letter-spacing: 4px;
      text-shadow: 0 4px 12px rgba(0,0,0,0.5);
    }
    
    .match-hero p {
      font-size: 18px;
      color: rgba(255,255,255,0.85);
      letter-spacing: 1px;
      max-width: 600px;
      margin: 0 auto;
    }
    
    .filter-panel { 
      background: var(--bg-card); 
      padding: 24px 32px; 
      border-radius: var(--radius); 
      border: 1px solid var(--border); 
      margin: 0 auto 40px; 
      display: flex; 
      gap: 20px; 
      align-items: flex-end; 
      flex-wrap: wrap; 
      box-shadow: 0 12px 32px rgba(0,0,0,0.1);
      position: relative;
      z-index: 3;
      width: 90%;
      max-width: 900px;
    }
    
    .filter-panel .form-label { color: var(--text-muted); font-weight: 600; letter-spacing: 1px; font-family: 'Cinzel', serif; font-size: 12px; }
    .filter-panel .form-input, .filter-panel .form-select {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 15px;
      padding: 10px 14px;
    }
    .filter-panel .form-input:focus, .filter-panel .form-select:focus {
      border-color: var(--royal-red);
      box-shadow: 0 0 0 3px var(--royal-red-dim);
    }
    .filter-panel .form-group { margin-bottom: 0; flex: 1; min-width: 140px; }
    
    .grid-matches { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 24px; }
    
    .match-card { 
      background: var(--bg-card);
      border: 1px solid var(--border); 
      border-radius: var(--radius); 
      padding: 0; 
      transition: all 0.3s ease; 
      position: relative; 
      overflow: hidden; 
      box-shadow: var(--shadow-sm); 
      display: flex;
      flex-direction: column;
    }
    
    .match-card:hover { 
      transform: translateY(-4px); 
      box-shadow: var(--shadow-hover);
      border-color: rgba(203, 163, 101, 0.4);
    }
    
    .mc-header {
      padding: 24px 24px 20px;
      display: flex;
      gap: 16px;
      align-items: center;
      border-bottom: 1px solid var(--border-light);
      position: relative;
    }

    .mc-status-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
    }
    .mc-status-bar.ok { background: linear-gradient(90deg, #10b981, #34d399); }
    .mc-status-bar.bad { background: linear-gradient(90deg, #ef4444, #f87171); }
    
    .mc-avatar {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background-size: cover;
      background-position: center;
      border: 2px solid var(--border);
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      flex-shrink: 0;
    }

    .mc-name {
      font-family: 'Cinzel', serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--royal-red);
      margin-bottom: 4px;
      line-height: 1.2;
    }
    
    .mc-meta {
      color: var(--text-secondary);
      font-weight: 500;
      font-size: 13px;
    }

    .mc-body {
      padding: 20px 24px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .mc-info-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: var(--text);
    }

    .mc-info-icon {
      color: var(--gold);
      flex-shrink: 0;
    }

    .mc-seal {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .mc-seal.ok {
      background: rgba(16, 185, 129, 0.1);
      color: #059669;
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .mc-seal.bad {
      background: rgba(239, 68, 68, 0.1);
      color: #dc2626;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
    
    .mc-footer {
      padding: 16px 24px;
      background: var(--bg-elevated);
      border-top: 1px solid var(--border-light);
    }

    .btn-royal {
      background: var(--royal-red);
      color: #fff;
      border: none;
      font-family: 'Cinzel', serif;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: 0.3s;
      box-shadow: var(--shadow-sm);
    }
    .btn-royal:hover {
      background: var(--royal-red-dark);
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }
  </style>
</head>
<body style="display: none;">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js?v=12"></script>
  <script src="js/shared-auth.js?v=12"></script>
  <script src="js/shared-data.js?v=12"></script>
  <script src="js/shared-nav.js?v=12"></script>
  <script>
    if (!localStorage.getItem('rootd_auth')) {
      window.location.href = 'login.html';
      throw new Error('Not authenticated');
    }
    document.body.style.display = '';
  </script>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-area">
      <header class="topbar" id="topbar"></header>
      <div class="page-content">
        
        <div class="match-hero anim">
          <div class="match-hero-content">
            <h1>Royal Matchmaking</h1>
            <p>Discover perfectly verified alliances, strictly honoring Gotra Exogamy traditions.</p>
          </div>
        </div>
        
        <div class="filter-panel anim anim-delay-1">
          <div class="form-group">
            <label class="form-label">Match For</label>
            <select id="matchForSelect" class="form-select"></select>
          </div>
          <div class="form-group">
            <label class="form-label">Min Age</label>
            <input type="number" id="minAge" class="form-input" value="18">
          </div>
          <div class="form-group">
            <label class="form-label">Max Age</label>
            <input type="number" id="maxAge" class="form-input" value="35">
          </div>
          <button class="btn btn-royal" style="padding: 12px 24px; height:42px" onclick="runEngine()">Find Alliances</button>
        </div>
        
        <div class="section-header anim anim-delay-2" id="resultsTitle" style="color:var(--gold); border-bottom-color:rgba(212,175,55,0.2)">Potential Alliances</div>
        <div class="grid-matches anim anim-delay-2 mb-4" id="matchesContainer"></div>

      </div>
    </div>
  </div>

  <script>
    if (!requireAuth()) throw '';
    initNav('matchmaking');
    
    // Matchmaking engine now strictly uses the dynamic family network data
    const singles = familyMembers.filter(m => !m.spouse && m.age >= 18);
    const select = document.getElementById('matchForSelect');
    
    if (singles.length === 0) {
      select.innerHTML = '<option value="">No eligible singles in your network</option>';
    } else {
      singles.forEach(s => {
        select.innerHTML += `<option value="${s.id}">${getFullName(s)} (${s.age}, ${s.gender}, ${s.gotra})</option>`;
      });
      const loggedInId = getAuthData().userId;
      if(singles.find(s=>s.id===loggedInId)) select.value = loggedInId;
      else if (singles.length > 0) select.value = singles[0].id;
    }
    
    function runEngine() {
      const targetId = document.getElementById('matchForSelect').value;
      const target = getMemberById(targetId);
      
      const container = document.getElementById('matchesContainer');
      
      if(!target) {
        container.innerHTML = '<div style="color:var(--text-muted)">No profile selected for matchmaking.</div>';
        return;
      }
      
      const minAge = parseInt(document.getElementById('minAge').value) || 18;
      const maxAge = parseInt(document.getElementById('maxAge').value) || 100;
      const oppositeGender = target.gender === 'M' ? 'F' : 'M';
      
      document.getElementById('resultsTitle').innerHTML = `Verified Alliances for: <span style="color:var(--royal-red)">${getFullName(target)}</span>`;
      
      let html = '';
      
      // Use only live network for matches
      const searchPool = [...familyMembers];
      
      searchPool.forEach(candidate => {
        if(candidate.id === target.id) return;
        if(candidate.gender !== oppositeGender) return;
        if(candidate.age < minAge || candidate.age > maxAge) return;
        const isConflict = candidate.gotra === target.gotra;
        const barClass = isConflict ? 'bad' : 'ok';
        
        html += \`
          <div class="match-card">
            <div class="mc-status-bar \${barClass}"></div>
            <div class="mc-seal \${barClass}">
              \${isConflict ? 
                '<svg width="14" height="14" fill="currentColor" viewBox="0 0 16 16"><path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/></svg> Exogamy Conflict' : 
                '<svg width="14" height="14" fill="currentColor" viewBox="0 0 16 16"><path d="M10.97 4.97a.75.75 0 0 1 1.07 1.05l-3.99 4.99a.75.75 0 0 1-1.08.02L4.324 8.384a.75.75 0 1 1 1.06-1.06l2.094 2.093 3.473-4.425a.267.267 0 0 1 .02-.022z"/></svg> 100% Verified'}
            </div>
            
            <div class="mc-header">
              <div class="mc-avatar" style="background-image:url('\${candidate.imageUrl || ''}')"></div>
              <div>
                <div class="mc-name">\${candidate.firstName} \${candidate.lastName}</div>
                <div class="mc-meta">\${candidate.age} Yrs · \${candidate.gender === 'M' ? 'Male' : 'Female'}</div>
              </div>
            </div>
            
            <div class="mc-body">
              <div class="mc-info-row">
                <svg class="mc-info-icon" width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
                <span><strong>\${candidate.gotra}</strong> Gotra · \${candidate.caste}</span>
              </div>
              <div class="mc-info-row">
                <svg class="mc-info-icon" width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4 6v-7.5l4-2.222"/></svg>
                <span>\${candidate.education || 'Education not specified'}</span>
              </div>
              <div class="mc-info-row">
                <svg class="mc-info-icon" width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/></svg>
                <span>\${candidate.location || candidate.nativePlace || 'Location not specified'}</span>
              </div>
            </div>
            
            <div class="mc-footer">
              <button class="btn btn-royal" style="width:100%" onclick="window.location.href='profile.html?id=\${candidate.id}'">View Royal Profile</button>
            </div>
          </div>
        \`;
      });
      
      if(html === '') html = '<div style="color:var(--text-muted)">No candidates found matching the criteria.</div>';
      container.innerHTML = html;
    }
    
    // Auto-run if singles exist
    setTimeout(() => { if (singles.length > 0) runEngine(); }, 100);
  </script>
</body>
</html>
