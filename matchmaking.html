<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vansh (वंश) — Royal Matchmaking</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/shared.css?v=19">
  <style>
    /* Premium Indian Wedding Theme - BloodLine Overhaul */
    .page-content { 
      position: relative; z-index: 2; padding-top: 10px; 
      background-image: url('assets/wedding_bg.png'); 
      background-size: cover; 
      background-attachment: fixed; 
      background-position: center; 
      min-height: 100vh; 
    }
    
    .match-hero {
      background: linear-gradient(180deg, rgba(0,0,0,0.2) 0%, rgba(60, 5, 10, 0.85) 100%), url('assets/wedding_hero.png');
      background-size: cover;
      background-position: center;
      border: 1px solid var(--gold-bright);
      border-radius: var(--radius);
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 2px 4px rgba(255,255,255,0.1), 0 12px 40px rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 40px 20px 60px 20px;
      margin-bottom: -30px;
    }
    
    .match-hero-content { position: relative; z-index: 2; }

    .match-hero h1 { 
      font-size: 32px; 
      font-weight: 800; 
      color: var(--gold-bright); 
      margin-bottom: 12px; 
      text-transform: uppercase;
      letter-spacing: 5px;
      font-family: 'Cinzel', serif;
      text-shadow: 0 4px 12px rgba(0,0,0,0.6), 0 0 20px rgba(212,175,55,0.4);
    }
    
    .match-hero p {
      font-size: 14px;
      color: #fff;
      letter-spacing: 1.5px;
      max-width: 600px;
      margin: 0 auto;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }
    
    .filter-panel { 
      background: linear-gradient(135deg, rgba(138,28,36,0.9) 0%, rgba(74,12,16,0.95) 100%); 
      padding: 24px 32px; 
      border-radius: 16px; 
      border: 1.5px solid var(--gold-bright); 
      margin: 0 auto 30px; 
      display: flex; 
      gap: 20px; 
      align-items: flex-end; 
      flex-wrap: wrap; 
      box-shadow: inset 0 2px 4px rgba(255,255,255,0.15), 0 16px 40px rgba(0,0,0,0.6), 0 0 20px rgba(212,175,55,0.2);
      position: relative;
      z-index: 3;
      width: 90%;
      max-width: 900px;
      backdrop-filter: blur(12px);
    }
    
    .filter-panel .form-label { color: var(--gold-bright); font-weight: 800; letter-spacing: 2px; font-family: 'Cinzel', serif; font-size: 11px; margin-bottom: 8px; display: block; text-shadow: 0 1px 2px rgba(0,0,0,0.8); }
    .filter-panel .form-input, .filter-panel .form-select {
      background: rgba(0,0,0,0.6);
      border: 1px solid var(--gold);
      color: #fff;
      font-size: 14px;
      padding: 12px 16px;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      transition: 0.3s;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
    }
    .filter-panel .form-input:focus, .filter-panel .form-select:focus {
      border-color: var(--gold-bright);
      outline: none;
      background: rgba(0,0,0,0.8);
      box-shadow: 0 0 0 1.5px var(--gold-bright);
    }
    .filter-panel .form-select option { background: #2a0608; color: #fff; }
    .filter-panel .form-group { margin-bottom: 0; flex: 1; min-width: 120px; }
    
    .grid-matches { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; }
    
    /* ── SUPER COMPACT BLOODLINE CARD ── */
    .match-card {
      position: relative; width: 230px; padding: 2.5px; border-radius: 12px; 
      background: linear-gradient(135deg, #f0c75a 0%, #d4af37 30%, #8b6914 55%, #d4af37 80%, #f4d772 100%); 
      box-shadow: 0 8px 24px rgba(0,0,0,0.55); 
      transition: transform 0.3s ease, box-shadow 0.3s ease; 
      cursor: pointer;
      display: flex; flex-direction: column;
    }
    .match-card:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,0.65), 0 0 20px rgba(212,175,55,0.3); }
    .match-card::before { content: ''; position: absolute; inset: 2.5px; border-radius: 10px; border: 1.5px solid rgba(139, 105, 20, 0.55); pointer-events: none; z-index: 3; }
    
    .match-inner {
      position: relative; display: flex; flex-direction: column; padding: 12px; 
      background: linear-gradient(135deg, #6e1a1f 0%, #5c1418 60%, #4a0e12 100%); 
      border-radius: 9px; overflow: hidden; z-index: 2; height: 100%;
    }
    .match-inner::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 30% 0%, rgba(212, 175, 55, 0.08), transparent 60%); pointer-events: none; }
    
    .mc-header { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; border-bottom: 1px dashed rgba(212,175,55,0.2); padding-bottom: 10px; }
    
    .photo-frame { position: relative; width: 52px; height: 52px; flex-shrink: 0; }
    .photo-frame .photo-clip { width: 100%; height: 100%; clip-path: polygon(50% 0%, 85% 15%, 100% 50%, 85% 85%, 50% 100%, 15% 85%, 0% 50%, 15% 15%); background: linear-gradient(135deg, #f4d772, #d4af37 50%, #8b6914); padding: 2px; }
    .photo-frame .photo-inner { width: 100%; height: 100%; clip-path: polygon(50% 0%, 85% 15%, 100% 50%, 85% 85%, 50% 100%, 15% 85%, 0% 50%, 15% 15%); background: #2a0608; display: flex; align-items: center; justify-content: center; overflow: hidden; background-size: cover; background-position: center; }
    .photo-frame .photo-inner svg { width: 100%; height: 100%; }
    
    .mc-info { flex: 1; min-width: 0; }
    .mc-name { font-family: 'Cinzel', serif; font-weight: 700; font-size: 13px; color: var(--gold-bright); letter-spacing: 0.02em; text-shadow: 0 1px 2px rgba(0,0,0,0.55); margin-bottom: 2px; line-height: 1.1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mc-meta { font-family: 'Cinzel', serif; font-weight: 600; font-size: 9px; letter-spacing: 0.15em; color: #d4a880; }
    
    .mc-body { display: flex; flex-direction: column; gap: 6px; flex: 1; }
    .mc-info-row { display: flex; align-items: center; gap: 6px; font-size: 10px; font-weight: 500; color: #f0d8b0; line-height: 1.3; }
    .mc-info-icon { width: 12px; height: 12px; color: var(--gold-bright); opacity: 0.85; flex-shrink: 0; filter: drop-shadow(0 1px 1px rgba(0,0,0,0.4)); }
    
    /* Glowing Seal */
    .mc-seal {
      position: absolute; top: -8px; right: -8px; 
      display: flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; border-radius: 50%;
      border: 1.5px solid var(--gold-bright); z-index: 10;
    }
    .mc-seal.ok {
      background: radial-gradient(circle at 30% 30%, #6fdcc8, #2a9d8f 70%, #0c4a40 100%);
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.6), inset 0 -1px 1px rgba(0,0,0,0.4), 0 0 10px rgba(42, 157, 143, 0.6);
      color: #fff;
    }
    .mc-seal.bad {
      background: radial-gradient(circle at 30% 30%, #ff5c6c, #c41e3a 70%, #6a0a14 100%);
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.6), inset 0 -1px 1px rgba(0,0,0,0.4), 0 0 10px rgba(196, 30, 58, 0.6);
      color: #fff;
    }
    
    .btn-royal {
      background: linear-gradient(135deg, var(--gold-bright), var(--gold-deepest)) !important;
      color: #2a0608 !important;
      border: 1px solid #fff !important;
      border-radius: 6px;
      font-family: 'Cinzel', serif;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-size: 12px;
      padding: 10px 16px;
      transition: 0.3s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.8);
      cursor: pointer;
      text-align: center;
      width: 100%;
      margin-top: 12px;
    }
    .btn-royal:hover { background: linear-gradient(135deg, #fff, var(--gold-bright)) !important; transform: translateY(-1px); box-shadow: 0 6px 14px rgba(212,175,55,0.6); }
  </style>
</head>
<body style="display: none;">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js?v=12"></script>
  <script src="js/shared-auth.js?v=12"></script>
  <script src="js/shared-data.js?v=12"></script>
  <script src="js/shared-nav.js?v=12"></script>
  <script>
    if (!localStorage.getItem('rootd_auth')) {
      window.location.href = 'login.html';
      throw new Error('Not authenticated');
    }
    document.body.style.display = '';
  </script>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-area">
      <header class="topbar" id="topbar"></header>
      <div class="page-content">
        
        <div class="match-hero anim">
          <div class="match-hero-content">
            <h1>Royal Matchmaking</h1>
            <p>Discover perfectly verified alliances, strictly honoring Gotra Exogamy traditions.</p>
          </div>
        </div>
        
        <div class="filter-panel anim anim-delay-1">
          <div class="form-group">
            <label class="form-label">Match For</label>
            <select id="matchForSelect" class="form-select"></select>
          </div>
          <div class="form-group">
            <label class="form-label">Age Max</label>
            <input type="number" id="maxAge" class="form-input" value="35">
          </div>
          <div class="form-group">
            <label class="form-label">Gotra</label>
            <select id="gotraFilter" class="form-select">
              <option value="">Any Gotra</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Location</label>
            <select id="locationFilter" class="form-select">
              <option value="">Any Location</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Education</label>
            <input type="text" id="eduFilter" class="form-input" placeholder="e.g. MBA">
          </div>
          <div class="form-group">
            <label class="form-label">Occupation</label>
            <input type="text" id="occFilter" class="form-input" placeholder="e.g. Tech">
          </div>
          <div class="form-group" style="flex: 1 1 100%;">
            <button class="btn btn-royal" style="padding: 12px 24px; height:42px" onclick="runEngine()">Find Alliances</button>
          </div>
        </div>
        
        <div class="section-header anim anim-delay-2" id="resultsTitle" style="color:var(--gold); border-bottom-color:rgba(212,175,55,0.2)">Potential Alliances</div>
        <div class="grid-matches anim anim-delay-2 mb-4" id="matchesContainer"></div>

      </div>
    </div>
  </div>

  <script>
    if (!requireAuth()) throw '';
    initNav('matchmaking');
    
    // Matchmaking engine now strictly uses the dynamic family network data
    const singles = familyMembers.filter(m => !m.spouse && m.age >= 18);
    const select = document.getElementById('matchForSelect');
    
    if (singles.length === 0) {
      select.innerHTML = '<option value="">No eligible singles in your network</option>';
    } else {
      singles.forEach(s => {
        select.innerHTML += `<option value="${s.id}">${getFullName(s)} (${s.age}, ${s.gender}, ${s.gotra})</option>`;
      });
      const loggedInId = getAuthData().userId;
      if(singles.find(s=>s.id===loggedInId)) select.value = loggedInId;
      else if (singles.length > 0) select.value = singles[0].id;
      
      const globalPool = [...familyMembers, ...MATCHMAKING_DB];
      
      const allGotras = [...new Set(globalPool.map(m => m.gotra).filter(g => g))].sort();
      const gotraSelect = document.getElementById('gotraFilter');
      allGotras.forEach(g => gotraSelect.innerHTML += `<option value="${g}">${g}</option>`);

      const allLocations = [...new Set(globalPool.map(m => m.location || m.nativePlace).filter(l => l))].sort();
      const locSelect = document.getElementById('locationFilter');
      allLocations.forEach(l => locSelect.innerHTML += `<option value="${l}">${l}</option>`);
    }
    
    function runEngine() {
      const targetId = document.getElementById('matchForSelect').value;
      const target = getMemberById(targetId);
      
      const container = document.getElementById('matchesContainer');
      
      if(!target) {
        container.innerHTML = '<div style="color:var(--text-muted)">No profile selected for matchmaking.</div>';
        return;
      }
      
      const maxAge = parseInt(document.getElementById('maxAge').value) || 100;
      const gotraF = document.getElementById('gotraFilter').value;
      const locF = document.getElementById('locationFilter').value;
      const eduF = document.getElementById('eduFilter').value.toLowerCase();
      const occF = document.getElementById('occFilter').value.toLowerCase();
      
      const oppositeGender = target.gender === 'M' ? 'F' : 'M';
      
      document.getElementById('resultsTitle').innerHTML = `Verified Alliances for: <span style="color:var(--royal-red)">${getFullName(target)}</span>`;
      
      let html = '';
      
      const searchPool = [...familyMembers, ...MATCHMAKING_DB];
      
      searchPool.forEach(candidate => {
        if(candidate.id === target.id) return;
        if(candidate.gender !== oppositeGender) return;
        if(candidate.age > maxAge) return;
        
        if(gotraF && candidate.gotra !== gotraF) return;
        const cLoc = candidate.location || candidate.nativePlace;
        if(locF && cLoc !== locF) return;
        if(eduF && (!candidate.education || !candidate.education.toLowerCase().includes(eduF))) return;
        if(occF && (!candidate.occupation || !candidate.occupation.toLowerCase().includes(occF))) return;
        
        const isConflict = candidate.gotra === target.gotra;
        const barClass = isConflict ? 'bad' : 'ok';
        
        const ini = getInitials(candidate);
        const fallbackSvg = candidate.imageUrl ? '' : `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="100" fill="#2a1410"/><path d="M10 100 L10 80 Q25 65 50 65 Q75 65 90 80 L90 100 Z" fill="#1a1a2e"/><ellipse cx="50" cy="42" rx="18" ry="22" fill="#d4a574"/><text x="50" y="47" font-size="16" fill="#fff" text-anchor="middle" font-family="Cinzel">${ini}</text></svg>`;

        html += `
          <div class="match-card">
            <div class="match-inner">
              <div class="mc-seal ${barClass}">
                ${isConflict ? 
                  '<svg width="14" height="14" fill="currentColor" viewBox="0 0 16 16"><path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/></svg>' : 
                  '<svg width="14" height="14" fill="currentColor" viewBox="0 0 16 16"><path d="M10.97 4.97a.75.75 0 0 1 1.07 1.05l-3.99 4.99a.75.75 0 0 1-1.08.02L4.324 8.384a.75.75 0 1 1 1.06-1.06l2.094 2.093 3.473-4.425a.267.267 0 0 1 .02-.022z"/></svg>'}
              </div>
              
              <div class="mc-header">
                <div class="photo-frame">
                  <div class="photo-clip">
                    <div class="photo-inner" style="background-image:url('${candidate.imageUrl || ''}')">
                      ${fallbackSvg}
                    </div>
                  </div>
                </div>
                <div class="mc-info">
                  <div class="mc-name">${candidate.firstName} ${candidate.lastName}</div>
                  <div class="mc-meta">${candidate.age} Yrs · ${candidate.gender === 'M' ? 'Male' : 'Female'}</div>
                </div>
              </div>
              
              <div class="mc-body">
                <div class="mc-info-row">
                  <svg class="mc-info-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
                  <span><strong>${candidate.gotra}</strong> · ${candidate.caste}</span>
                </div>
                <div class="mc-info-row">
                  <svg class="mc-info-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4 6v-7.5l4-2.222"/></svg>
                  <span>${candidate.education || 'N/A'}</span>
                </div>
                <div class="mc-info-row">
                  <svg class="mc-info-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/></svg>
                  <span>${candidate.location || candidate.nativePlace || 'N/A'}</span>
                </div>
              </div>
              
              <button class="btn-royal" onclick="window.location.href='profile.html?id=${candidate.id}'">View Profile</button>
            </div>
          </div>
        `;
      });
      
      if(html === '') html = '<div style="color:var(--text-muted)">No candidates found matching the criteria.</div>';
      container.innerHTML = html;
    }
    
    // Auto-run if singles exist
    setTimeout(() => { if (singles.length > 0) runEngine(); }, 100);
  </script>
</body>
</html>
