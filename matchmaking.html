<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vansh (वंश) — Royal Matchmaking</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/shared.css">
  <style>
    /* Premium Indian Wedding Theme */
    body {
      background-color: #2b060d; /* Deep rich maroon */
      background-image: 
        radial-gradient(circle at top right, rgba(212, 175, 55, 0.15) 0%, transparent 40%),
        radial-gradient(circle at bottom left, rgba(212, 175, 55, 0.15) 0%, transparent 40%);
      color: #fdfaf0;
    }
    
    .main-area {
      background: transparent;
    }

    .match-header { 
      padding: 50px 40px; 
      background: linear-gradient(135deg, rgba(74, 14, 27, 0.95), rgba(43, 6, 13, 0.95));
      border: 2px solid var(--gold); 
      border-radius: 12px; 
      margin-bottom: 40px; 
      text-align: center; 
      box-shadow: 0 10px 40px rgba(0,0,0,0.5), inset 0 0 30px rgba(212,175,55,0.1); 
      position: relative;
      overflow: hidden;
    }
    
    /* Decorative mandala corner */
    .match-header::before {
      content: ''; position: absolute; top: -50px; left: -50px; width: 150px; height: 150px;
      background: radial-gradient(circle, transparent 30%, var(--gold) 31%, var(--gold) 33%, transparent 34%, transparent 45%, var(--gold) 46%, var(--gold) 48%, transparent 49%);
      opacity: 0.2; transform: rotate(45deg);
    }
    .match-header::after {
      content: ''; position: absolute; bottom: -50px; right: -50px; width: 150px; height: 150px;
      background: radial-gradient(circle, transparent 30%, var(--gold) 31%, var(--gold) 33%, transparent 34%, transparent 45%, var(--gold) 46%, var(--gold) 48%, transparent 49%);
      opacity: 0.2; transform: rotate(45deg);
    }

    .match-header h1 { 
      font-size: 38px; 
      font-weight: 800; 
      color: var(--gold); 
      margin-bottom: 16px; 
      text-transform: uppercase;
      letter-spacing: 4px;
      text-shadow: 0 4px 15px rgba(212,175,55,0.4);
    }
    
    .match-header p {
      font-size: 16px;
      color: #ffe89c;
      letter-spacing: 1px;
    }
    
    .filter-panel { 
      background: rgba(255, 255, 255, 0.03); 
      backdrop-filter: blur(10px);
      padding: 30px; 
      border-radius: 12px; 
      border: 1px solid rgba(212, 175, 55, 0.3); 
      margin-bottom: 40px; 
      display: flex; 
      gap: 20px; 
      align-items: flex-end; 
      flex-wrap: wrap; 
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    
    .filter-panel .form-label { color: #ffe89c; font-weight: 600; letter-spacing: 1px; font-family: 'Cinzel', serif; }
    .filter-panel .form-input, .filter-panel .form-select {
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(212,175,55,0.4);
      color: #fff;
    }
    .filter-panel .form-input:focus, .filter-panel .form-select:focus {
      border-color: var(--gold);
      box-shadow: 0 0 10px rgba(212,175,55,0.2);
    }
    .filter-panel .form-group { margin-bottom: 0; flex: 1; min-width: 180px; }
    
    .grid-matches { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 30px; }
    
    .match-card { 
      background: linear-gradient(to bottom, #ffffff, #fdfaf0);
      border: 2px solid var(--gold); 
      border-radius: 8px; 
      padding: 30px 24px; 
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
      position: relative; 
      overflow: hidden; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
    }
    
    .match-card:hover { 
      transform: translateY(-10px) scale(1.02); 
      box-shadow: 0 20px 40px rgba(212, 175, 55, 0.2); 
    }
    
    .match-bar { position: absolute; top: 0; left: 0; height: 6px; background: var(--gold); }
    .match-bar.ok { background: linear-gradient(90deg, #28a745, #34ce57); }
    .match-bar.bad { background: linear-gradient(90deg, #dc3545, #ff4d4d); }
    
    .mc-name {
      font-family: 'Cinzel', serif;
      font-size: 22px;
      font-weight: 800;
      color: #3a0815;
    }
    
    .mc-meta {
      color: #666;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 1px;
    }
    
    .mc-tag {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      background: rgba(212,175,55,0.1);
      color: #9a7b1b;
      border: 1px solid rgba(212,175,55,0.3);
    }
    
    .mc-tag-conflict {
      background: rgba(220,53,69,0.1);
      color: #dc3545;
      border-color: rgba(220,53,69,0.3);
    }

    .btn-royal {
      background: linear-gradient(135deg, #d4af37, #aa8620);
      color: #fff;
      border: none;
      font-family: 'Cinzel', serif;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: 0.3s;
      box-shadow: 0 4px 15px rgba(212,175,55,0.3);
    }
    .btn-royal:hover {
      background: linear-gradient(135deg, #ebd17a, #c49d29);
      box-shadow: 0 6px 20px rgba(212,175,55,0.5);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-area">
      <header class="topbar" id="topbar"></header>
      <div class="page-content">
        
        <div class="match-header anim">
          <h1>Royal Matchmaking</h1>
          <p>Discover perfectly verified alliances, strictly honoring Gotra Exogamy traditions.</p>
        </div>
        
        <div class="filter-panel anim anim-delay-1">
          <div class="form-group">
            <label class="form-label">Match For</label>
            <select id="matchForSelect" class="form-select"></select>
          </div>
          <div class="form-group">
            <label class="form-label">Min Age</label>
            <input type="number" id="minAge" class="form-input" value="18">
          </div>
          <div class="form-group">
            <label class="form-label">Max Age</label>
            <input type="number" id="maxAge" class="form-input" value="35">
          </div>
          <button class="btn btn-royal" style="padding: 12px 24px" onclick="runEngine()">Find Alliances</button>
        </div>
        
        <div class="section-header anim anim-delay-2" id="resultsTitle" style="color:var(--gold); border-bottom-color:rgba(212,175,55,0.2)">Potential Alliances</div>
        <div class="grid-matches anim anim-delay-2 mb-4" id="matchesContainer"></div>

      </div>
    </div>
  </div>

  <script src="js/shared-auth.js"></script>
  <script src="js/shared-data.js"></script>
  <script src="js/shared-nav.js"></script>
  <script>
    if (!requireAuth()) throw '';
    initNav('matchmaking');
    
    // EXTERNAL CANDIDATE DATABASE (To ensure live users always have matches)
    const EXTERNAL_CANDIDATES = [
      { id: "E1", firstName: "Simran", lastName: "Verma", age: 24, caste: "Brahmin", gotra: "Vatsa", nativePlace: "Delhi", education: "M.Sc Economics", gender: "F", imageUrl: "https://images.unsplash.com/photo-1517841905240-472988babdf9?w=400&q=80" },
      { id: "E2", firstName: "Sneha", lastName: "Iyer", age: 25, caste: "Brahmin", gotra: "Bharadwaj", nativePlace: "Mumbai", education: "B.Tech CS", gender: "F", imageUrl: "https://images.unsplash.com/photo-1524250502761-1ac6f2e30d43?w=400&q=80" },
      { id: "E3", firstName: "Ananya", lastName: "Joshi", age: 22, caste: "Brahmin", gotra: "Sandilya", nativePlace: "Pune", education: "MBA Finance", gender: "F", imageUrl: "https://images.unsplash.com/photo-1502823403499-6ccfcf4fb453?w=400&q=80" },
      { id: "E4", firstName: "Ritu", lastName: "Gupta", age: 26, caste: "Agarwal", gotra: "Gautam", nativePlace: "Jaipur", education: "B.Com", gender: "F", imageUrl: "https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=400&q=80" },
      { id: "E5", firstName: "Rohan", lastName: "Mishra", age: 28, caste: "Brahmin", gotra: "Vatsa", nativePlace: "Kanpur", education: "CA", gender: "M", imageUrl: "https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?w=400&q=80" },
      { id: "E6", firstName: "Aditya", lastName: "Sharma", age: 27, caste: "Brahmin", gotra: "Kashyap", nativePlace: "Delhi", education: "M.Tech", gender: "M", imageUrl: "https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=400&q=80" },
      { id: "E7", firstName: "Vikram", lastName: "Singh", age: 29, caste: "Rajput", gotra: "Chauhan", nativePlace: "Udaipur", education: "B.Arch", gender: "M", imageUrl: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400&q=80" }
    ];

    const singles = familyMembers.filter(m => !m.spouse && m.age >= 18);
    const select = document.getElementById('matchForSelect');
    
    if (singles.length === 0) {
      select.innerHTML = '<option value="">No eligible singles in your network</option>';
    } else {
      singles.forEach(s => {
        select.innerHTML += `<option value="${s.id}">${getFullName(s)} (${s.age}, ${s.gender}, ${s.gotra})</option>`;
      });
      const loggedInId = getAuthData().userId;
      if(singles.find(s=>s.id===loggedInId)) select.value = loggedInId;
      else if (singles.length > 0) select.value = singles[0].id;
    }
    
    function runEngine() {
      const targetId = document.getElementById('matchForSelect').value;
      const target = getMemberById(targetId);
      
      const container = document.getElementById('matchesContainer');
      
      if(!target) {
        container.innerHTML = '<div style="color:#ffe89c">No profile selected for matchmaking.</div>';
        return;
      }
      
      const minAge = parseInt(document.getElementById('minAge').value) || 18;
      const maxAge = parseInt(document.getElementById('maxAge').value) || 100;
      const oppositeGender = target.gender === 'M' ? 'F' : 'M';
      
      document.getElementById('resultsTitle').innerHTML = `Verified Alliances for: <span style="color:#fff">${getFullName(target)}</span>`;
      
      let html = '';
      
      // Combine live network + external candidates for matches
      const searchPool = [...familyMembers, ...EXTERNAL_CANDIDATES];
      
      searchPool.forEach(candidate => {
        if(candidate.id === target.id) return;
        if(candidate.gender !== oppositeGender) return;
        if(candidate.age < minAge || candidate.age > maxAge) return;
        
        const isConflict = candidate.gotra === target.gotra;
        const barClass = isConflict ? 'bad' : 'ok';
        const tagHTML = isConflict ? '<span style="color:#dc3545; font-weight:bold; font-size:12px; display:flex; align-items:center; gap:4px"><svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/></svg> Conflict</span>' : '<span style="color:#28a745; font-weight:bold; font-size:12px; display:flex; align-items:center; gap:4px"><svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M10.97 4.97a.75.75 0 0 1 1.07 1.05l-3.99 4.99a.75.75 0 0 1-1.08.02L4.324 8.384a.75.75 0 1 1 1.06-1.06l2.094 2.093 3.473-4.425a.267.267 0 0 1 .02-.022z"/></svg> Verified</span>';
        
        html += `
          <div class="match-card">
            <div class="match-bar ${barClass}" style="width: 100%"></div>
            <div class="flex justify-between items-start mb-4">
              <div class="flex gap-4 items-center">
                <div class="pc-avatar" style="width:60px;height:60px;background-image:url('${candidate.imageUrl || ''}'); border: 2px solid var(--gold); box-shadow: 0 0 10px rgba(212,175,55,0.4)"></div>
                <div>
                  <div class="mc-name">${candidate.firstName} ${candidate.lastName}</div>
                  <div class="mc-meta mt-1">${candidate.age} Yrs · ${candidate.nativePlace || 'India'}</div>
                </div>
              </div>
            </div>
            
            <div class="flex gap-2 mb-4">
              <span class="mc-tag">${candidate.gotra} Gotra</span>
              <span class="mc-tag">${candidate.caste}</span>
            </div>
            
            <div style="font-size: 13px; color: #555; font-weight: 500; margin-bottom: 20px;">
              <b>Education:</b> ${candidate.education || 'N/A'}
            </div>
            
            <div class="flex justify-between items-center mb-4 pb-4" style="border-bottom: 1px solid #eee">
              ${tagHTML}
              ${isConflict ? `<span style="font-size:11px; color:#dc3545; font-weight:600">Exogamy Violation</span>` : `<span style="font-size:11px; color:#28a745; font-weight:600">100% Compliant</span>`}
            </div>
            
            <button class="btn btn-royal w-full" style="width:100%" onclick="showToast('Premium Feature','Full Kundali & Horoscope viewing will be available in the upcoming Premium tier.','info')">View Royal Profile</button>
          </div>
        `;
      });
      
      if(html === '') html = '<div style="color:#ffe89c">No candidates found matching the criteria.</div>';
      container.innerHTML = html;
    }
    
    // Auto-run if singles exist
    setTimeout(() => { if (singles.length > 0) runEngine(); }, 100);
  </script>
</body>
</html>
