<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vansh (à¤µà¤‚à¤¶) â€” Member Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/shared.css?v=3">
  <style>
    .main-area { background: transparent; }

    .hero-card {
      background: var(--bg-card);
      color: var(--text);
      border: 1px solid var(--border); border-radius: 12px;
      padding: 40px; margin-bottom: 32px; display: flex; align-items: center; gap: 32px;
      box-shadow: var(--shadow-card);
      position: relative; overflow: hidden;
    }
    
    /* Decorative mandala corner */
    .hero-card::before {
      content: ''; position: absolute; top: -50px; left: -50px; width: 150px; height: 150px;
      background: radial-gradient(circle, transparent 30%, var(--royal-red-dim) 31%, var(--royal-red-dim) 33%, transparent 34%, transparent 45%, var(--royal-red-dim) 46%, var(--royal-red-dim) 48%, transparent 49%);
      opacity: 0.5; transform: rotate(45deg);
    }

    .hero-avatar { width: 130px; height: 130px; font-size: 36px; border: 3px solid var(--bg-card); box-shadow: 0 0 0 3px var(--royal-red), 0 0 20px var(--royal-red-glow); border-radius: 50%; z-index: 1; }
    .hero-name { font-size: 36px; font-weight: 800; font-family: 'Cinzel', serif; display: flex; align-items: center; gap: 12px; margin-bottom: 6px; color: var(--royal-red); text-transform: uppercase; letter-spacing: 2px; }
    .hero-meta { font-size: 15px; color: var(--text-secondary); font-weight: 600; letter-spacing: 1px;}
    .hero-bio { font-size: 15px; color: var(--text); margin-top: 16px; line-height: 1.6; max-width: 700px; }
    
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    .info-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; box-shadow: var(--shadow-sm); }
    .info-label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); margin-bottom: 4px; font-weight: 700; }
    .info-val { font-size: 16px; font-weight: 600; font-family: 'Cinzel', serif; color: var(--text); }
    
    .rel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px; margin-top: 24px; }
    .form-row { display: flex; gap: 16px; margin-bottom: 16px; }
    .form-row > div { flex: 1; }
    
    .section-header { border-bottom-color: rgba(212,175,55,0.2) !important; color: var(--gold) !important; }
  </style>
</head>
<body style="display: none;">
  <script>
    // Enforce instant auth guard before rendering any UI
    const authDataRaw = localStorage.getItem('rootd_auth');
    if (!authDataRaw) {
      window.location.href = 'login.html';
      throw new Error('Not authenticated');
    }
    document.body.style.display = '';
  </script>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-area">
      <header class="topbar" id="topbar"></header>
      <div class="page-content">
        
        <div id="profileContent" class="anim"></div>

      </div>
    </div>
  </div>



  <div class="modal-overlay" id="editModalOverlay">
    <div class="modal-box">
      <div class="modal-header">
        <div class="modal-title">Edit Profile</div>
        <button class="modal-close" onclick="closeEditModal()">Ã—</button>
      </div>
      <form id="editForm" onsubmit="event.preventDefault(); submitEditProfile();">
        <div class="modal-body">
          <input type="hidden" id="editId">
        <div class="form-row">
          <div class="form-group"><label class="form-label">First Name</label><input type="text" id="editFn" class="form-input" required></div>
          <div class="form-group"><label class="form-label">Last Name</label><input type="text" id="editLn" class="form-input" required></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Age</label><input type="number" id="editAge" class="form-input" required></div>
          <div class="form-group">
            <label class="form-label">Gotra</label>
            <select id="editGotra" class="form-select" required>
              <option value="">Select Gotra</option>
              <option value="Kashyap">Kashyap</option>
              <option value="Bharadwaj">Bharadwaj</option>
              <option value="Vatsa">Vatsa</option>
              <option value="Shandilya">Shandilya</option>
              <option value="Gautam">Gautam</option>
              <option value="Atri">Atri</option>
              <option value="Vashistha">Vashistha</option>
              <option value="Vishvamitra">Vishvamitra</option>
              <option value="Agastya">Agastya</option>
              <option value="Garg">Garg</option>
              <option value="Parashar">Parashar</option>
              <option value="Kaushal">Kaushal</option>
              <option value="Kaushik">Kaushik</option>
              <option value="Dhananjaya">Dhananjaya</option>
              <option value="Jamadagni">Jamadagni</option>
              <option value="Kaundinya">Kaundinya</option>
              <option value="Mudgal">Mudgal</option>
              <option value="Other">Other</option>
            </select>
          </div>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Height</label>
            <input type="text" id="editHeight" class="form-input" placeholder="e.g. 5'10&quot;">
          </div>
          <div class="form-group">
            <label class="form-label">Current City</label>
            <input type="text" id="editLocation" class="form-input" placeholder="e.g. Delhi, India">
          </div>
        </div>
        
        <div class="form-group">
          <label class="form-label">Profile Picture</label>
          <input type="file" id="editAvatar" class="form-input" accept="image/*">
        </div>
        
        <div class="form-row">
          <div class="form-group"><label class="form-label">Education</label><input type="text" id="editEdu" class="form-input" placeholder="e.g. B.Tech CS"></div>
          <div class="form-group"><label class="form-label">Occupation Title</label><input type="text" id="editOcc" class="form-input" placeholder="e.g. Software Engineer"></div>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Employment Sector</label>
            <select id="editSector" class="form-input" style="height:42px;">
              <option value="">Select Sector</option>
              <option value="Government">Government Job</option>
              <option value="Private">Private Corporate</option>
              <option value="Business">Business / Entrepreneur</option>
              <option value="Professional">Independent Professional</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Company / Organization</label>
            <input type="text" id="editCompany" class="form-input" placeholder="e.g. Google, Govt of India">
          </div>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Dietary Preference</label>
            <select id="editDiet" class="form-input" style="height:42px;">
              <option value="">Select Diet</option>
              <option value="Vegetarian">Vegetarian</option>
              <option value="Non-Vegetarian">Non-Vegetarian</option>
              <option value="Eggetarian">Eggetarian</option>
              <option value="Vegan">Vegan</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Manglik Status</label>
            <select id="editManglik" class="form-input" style="height:42px;">
              <option value="">Select Status</option>
              <option value="Non-Manglik">Non-Manglik</option>
              <option value="Manglik">Manglik</option>
              <option value="Anshik Manglik">Anshik Manglik</option>
            </select>
          </div>
        </div>

        <div class="form-group"><label class="form-label">Biography</label><input type="text" id="editBio" class="form-input" placeholder="A short bio..."></div>
        
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" onclick="closeEditModal()">Cancel</button>
          <button type="submit" class="btn btn-gold">Save Changes</button>
        </div>
      </form>
    </div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js?v=11"></script>
  <script src="js/shared-auth.js?v=11"></script>
  <script src="js/shared-data.js?v=11"></script>
  <script src="js/shared-nav.js?v=11"></script>
  <script src="js/shared-tree.js"></script>
  <script>
    if (!requireAuth()) throw '';
    initNav('profile');
    
    const params = new URLSearchParams(location.search);
    const loggedInId = getAuthData().userId;
    const memberId = params.get('id') || loggedInId;
    let member = getMemberById(memberId);
    
    function renderProfile() {
      if (!member) {
        document.getElementById('profileContent').innerHTML = '<div style="text-align:center;padding:60px">Member not found.</div>';
        return;
      }
      const relToViewer = getSmartIndianRelation(familyMembers, loggedInId, member.id);
      
      const verifiedIcon = member.verified ? '<span class="text-green" style="font-size:20px; border-radius:50%; background:var(--green-dim); width:32px; height:32px; display:inline-flex; align-items:center; justify-content:center;">âœ“</span>' : '';
      const badgeHTML = relToViewer ? `<div class="pc-badge ${relToViewer.badge}" style="position:static;display:inline-block">${relToViewer.latin}</div>` : '';
      
      let statusText = 'Single';
      if (member.spouse) {
        const spouse = getMemberById(member.spouse);
        statusText = spouse ? `Married to ${spouse.firstName}` : 'Married';
      }
      
      const heroHTML = `
        <div class="card mb-4" style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-card);position:relative;">
          <!-- decorative top bar -->
          <div style="height:40px; border-bottom:1px solid var(--border-light); background:var(--bg-elevated);"></div>
          
          <!-- decorative corner -->
          <div style="position:absolute; top: -50px; left: -50px; width: 150px; height: 150px; background: radial-gradient(circle, transparent 30%, var(--royal-red-dim) 31%, var(--royal-red-dim) 33%, transparent 34%, transparent 45%, var(--royal-red-dim) 46%, var(--royal-red-dim) 48%, transparent 49%); opacity: 0.5; transform: rotate(45deg); pointer-events:none;"></div>
          
          <div style="padding:0 24px 24px;display:flex;align-items:center;gap:24px;">
            <div class="pc-avatar" style="width:90px;height:90px;font-size:28px;border:4px solid var(--bg-card);box-shadow:0 0 0 2px var(--royal-red);z-index:2;${getAvatarStyle(member)}">${member.imageUrl?'':getInitials(member)}</div>
            <div style="flex:1; z-index:2;">
              <h1 style="font-size:24px;font-weight:700;color:var(--royal-red);font-family:'Cinzel',serif;margin-bottom:4px;display:flex;align-items:center;gap:12px;text-transform:uppercase;letter-spacing:1px;">${getFullName(member)} ${member.verified?'<span class="text-green" style="font-size:20px">âœ“</span>':''}</h1>
              <div style="color:var(--text-secondary);font-weight:600;font-size:14px;margin-bottom:6px">@${member.username || 'user'}</div>
              <div style="color:var(--text-muted);font-size:13px;font-weight:600;">Age: ${member.age} Yrs Â· ${member.gender} Â· ${member.occupation || 'N/A'} Â· Status: ${statusText}</div>
            </div>
            <div style="z-index:2;">
              ${member.id===loggedInId 
                ? '<button class="btn" style="background:var(--royal-red);color:#fff;border:none;" onclick="openEditModal()">Edit My Profile</button>' 
                : `<button class="btn" style="background:var(--royal-red);color:#fff;border:none;" onclick="promptSendInvite('${member.id}')">Connect Relationship</button>`}
            </div>
          </div>
        </div>
      `;
      
      let relsHTML = `
        <div class="card mt-4">
          <div class="card-header">
            <div class="section-header" style="margin:0">Network Embedded Map</div>
            <a href="tree.html?id=${member.id}" class="btn btn-outline btn-sm">Full Screen Map</a>
          </div>
          <div class="card-body" style="padding:40px; overflow-x:auto; background:var(--bg); border-top:1px solid var(--border); position:relative; min-height:400px;" id="profileTreeWrapper">
            <canvas id="profileTreeCanvas" style="position:absolute;top:0;left:0;pointer-events:none;z-index:1;"></canvas>
            <div id="profileTreeNodes" style="position:relative;z-index:2;"></div>
          </div>
        </div>
      `;
      
      const canEdit = member.id === loggedInId;
      const editBtnHTML = canEdit ? `<button class="btn btn-outline btn-sm" onclick="openEditModal()">Edit Profile</button>` : '';
      
      document.getElementById('profileContent').innerHTML = `
        <div class="flex justify-between items-start mb-4">
          <div class="section-header">Verified Profile</div>
          ${editBtnHTML}
        </div>
        
        ${heroHTML}
        
        <div class="grid-2">
          <div class="info-box">
            <div class="info-label">Caste Background</div>
            <div class="info-val">${getCasteLine(member)}</div>
          </div>
          <div class="info-box">
            <div class="info-label">Gotra Ancestry</div>
            <div class="info-val text-royal-red" style="color:var(--royal-red)">${member.gotra}</div>
          </div>
          <div class="info-box">
            <div class="info-label">Education</div>
            <div class="info-val">${member.education || 'Not Provided'}</div>
          </div>
          <div class="info-box">
            <div class="info-label">Occupation & Sector</div>
            <div class="info-val">${member.occupation || 'Not Provided'}${member.sector ? ' (' + member.sector + ')' : ''}</div>
          </div>
          <div class="info-box">
            <div class="info-label">Organization</div>
            <div class="info-val">${member.company || 'Not Provided'}</div>
          </div>
          <div class="info-box">
            <div class="info-label">Current City</div>
            <div class="info-val">${member.location || 'Not Provided'}</div>
          </div>
          <div class="info-box">
            <div class="info-label">Height</div>
            <div class="info-val">${member.height || 'Not Provided'}</div>
          </div>
          <div class="info-box">
            <div class="info-label">Manglik / Diet</div>
            <div class="info-val">${member.manglik || 'Not Provided'} Â· ${member.diet || 'Not Provided'}</div>
          </div>
        </div>
        
        ${relsHTML}
      `;
      
      setTimeout(() => {
        renderTreeToContainer('profileTreeNodes', 'profileTreeCanvas', member.id);
      }, 100);
    }
    
    renderProfile();
    
    function openEditModal() {
      document.getElementById('editId').value = member.id;
      document.getElementById('editFn').value = member.firstName;
      document.getElementById('editLn').value = member.lastName;
      document.getElementById('editAge').value = member.age;
      document.getElementById('editGotra').value = member.gotra;
      document.getElementById('editHeight').value = member.height || '';
      document.getElementById('editLocation').value = member.location || '';
      document.getElementById('editEdu').value = member.education || '';
      document.getElementById('editOcc').value = member.occupation || '';
      document.getElementById('editSector').value = member.sector || '';
      document.getElementById('editCompany').value = member.company || '';
      document.getElementById('editDiet').value = member.diet || '';
      document.getElementById('editManglik').value = member.manglik || '';
      document.getElementById('editBio').value = member.bio || '';
      document.getElementById('editAvatar').value = ''; // Reset file input
      base64EditAvatarData = ""; // Reset base64 data
      document.getElementById('editModalOverlay').classList.add('active');
    }
    
    function closeEditModal() { document.getElementById('editModalOverlay').classList.remove('active'); }
    
    let base64EditAvatarData = "";
    document.getElementById('editAvatar').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(evt) {
          base64EditAvatarData = evt.target.result;
        };
        reader.readAsDataURL(file);
      }
    });

    function submitEditProfile() {
      const id = document.getElementById('editId').value;
      const updates = {
        firstName: document.getElementById('editFn').value,
        lastName: document.getElementById('editLn').value,
        age: parseInt(document.getElementById('editAge').value),
        gotra: document.getElementById('editGotra').value,
        height: document.getElementById('editHeight').value,
        location: document.getElementById('editLocation').value,
        education: document.getElementById('editEdu').value,
        occupation: document.getElementById('editOcc').value,
        sector: document.getElementById('editSector').value,
        company: document.getElementById('editCompany').value,
        diet: document.getElementById('editDiet').value,
        manglik: document.getElementById('editManglik').value,
        bio: document.getElementById('editBio').value,
        imageUrl: base64EditAvatarData || member.imageUrl
      };
      updateFamilyMember(id, updates);
      member = getMemberById(id);
      closeEditModal();
      renderProfile();
      showToast('Profile Saved', 'Your personal details have been updated.', 'ok');
    }

    function promptSendInvite(toUserId) {
      const relation = prompt("What is your relationship to this person?\n(Enter: brother, sister, spouse, parent, or child)");
      if (!relation) return;
      
      const validRelations = ['brother', 'sister', 'spouse', 'parent', 'child'];
      if (!validRelations.includes(relation.toLowerCase())) {
        alert("Invalid relationship type. Please try again.");
        return;
      }
      
      const res = sendInvite(loggedInId, toUserId, relation.toLowerCase());
      if (res && res.success) {
        showToast('Invite Sent', res.message, 'ok');
      } else {
        alert(res ? res.message : "Failed to send invite.");
      }
    }
  </script>
</body>
</html>
