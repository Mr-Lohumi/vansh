<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vansh (वंश) — DNA Timeline</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/shared.css?v=100">
  <style>
    /* BloodLine Theme - Timeline Overhaul */
    .dna-page {
      background-image: url('assets/wedding_bg.png');
      background-size: cover;
      background-attachment: fixed;
      background-position: center;
      background-color: #1a040b;
      min-height: 100vh;
      color: var(--bg);
      position: relative;
      overflow-x: hidden;
    }
    .dna-page::before {
      content: '';
      position: absolute; inset: 0;
      background: rgba(255, 250, 240, 0.4); /* Light overlay for contrast */
      z-index: 0; pointer-events: none;
    }
    
    .dna-header { text-align: center; padding: 80px 20px; position: relative; z-index: 10; }
    .dna-header h1 { font-family: 'Cinzel', serif; font-size: 48px; color: #6a0a14; margin-bottom: 16px; text-shadow: 0 1px 2px rgba(0,0,0,0.1); }
    .dna-header p { color: #4a1518; font-size: 18px; max-width: 600px; margin: 0 auto; font-weight: 500; }
    
    .dna-container {
      position: relative; max-width: 1000px; margin: 0 auto; padding: 40px 0 120px;
      container-type: inline-size;
    }
    
    /* The Central DNA Helix */
    .dna-helix {
      position: absolute; top: 0; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 120px; z-index: 0;
    }
    
    /* Advanced Animations */
    .dna-item {
      position: relative; z-index: 2; width: 50%; padding: 40px; margin-bottom: 40px;
      opacity: 0; transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex; align-items: center;
    }
    .dna-item.left { left: 0; justify-content: flex-end; padding-right: 120px; text-align: right; transform: translateX(-100px) scale(0.9); }
    .dna-item.right { left: 50%; justify-content: flex-start; padding-left: 120px; text-align: left; transform: translateX(100px) scale(0.9); }
    
    @container (max-width: 768px) {
      .dna-helix { left: 40px; transform: translateX(-50%); }
      .dna-item { width: 100%; padding: 20px 20px 20px 100px !important; margin-bottom: 32px; left: 0 !important; justify-content: flex-start !important; text-align: left !important; transform: translateX(-100px) scale(0.9); }
      .dna-item.visible { transform: translateX(0) scale(1); }
      .dna-item .dna-rung { width: 40px !important; left: -80px !important; right: auto !important; transform: translateY(-50%) !important; }
      .dna-item.left .dna-avatars, .dna-item.right .dna-avatars { justify-content: flex-start; }
    }
    
    .dna-item.visible { opacity: 1; transform: translateX(0) scale(1); }
    
    /* Connecting rung */
    .dna-rung {
      position: absolute; top: 50%; width: 0px; height: 2px; background: linear-gradient(90deg, var(--gold-bright), var(--royal-red));
      box-shadow: 0 0 10px var(--gold-bright); z-index: -1; transition: width 1s ease 0.4s;
    }
    .dna-item.visible.left .dna-rung { width: 60px; right: 60px; transform: translateY(-50%); }
    .dna-item.visible.right .dna-rung { width: 60px; left: 60px; transform: translateY(-50%); }
    
    /* Content Card */
    .dna-content {
      background: linear-gradient(135deg, rgba(138,28,36,0.9) 0%, rgba(74,12,16,0.95) 100%);
      border: 1.5px solid var(--gold-bright);
      backdrop-filter: blur(12px);
      padding: 32px; border-radius: 16px; width: 100%; max-width: 400px;
      box-shadow: inset 0 2px 4px rgba(255,255,255,0.15), 0 16px 40px rgba(0,0,0,0.6); 
      transition: transform 0.4s, box-shadow 0.4s;
    }
    .dna-content:hover { 
      transform: scale(1.05); 
      box-shadow: inset 0 2px 4px rgba(255,255,255,0.15), 0 16px 40px rgba(0,0,0,0.6), 0 0 20px rgba(212,175,55,0.3); 
    }
    
    .dna-date { font-family: 'Cinzel', serif; font-size: 24px; color: var(--gold-bright); font-weight: 800; margin-bottom: 8px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
    .dna-title { font-size: 20px; font-weight: 600; color: #fff; margin-bottom: 12px; }
    .dna-desc { color: rgba(255,255,255,0.9); font-size: 14px; margin-bottom: 20px; line-height: 1.6; }
    
    .dna-avatars { display: flex; gap: 12px; }
    .dna-item.left .dna-avatars { justify-content: flex-end; }
    .dna-item.right .dna-avatars { justify-content: flex-start; }
    
    .dna-ava {
      width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--gold-bright);
      background-size: cover; background-position: center; box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
    }
    
    /* Return Button */
    .back-btn { position: fixed; top: 30px; left: 40px; z-index: 100; background: linear-gradient(135deg, var(--gold-bright), var(--gold-deepest)); color: #2a0608; padding: 10px 20px; border-radius: 8px; border: 1px solid #fff; text-decoration: none; font-size: 13px; font-family: 'Cinzel', serif; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; box-shadow: 0 4px 10px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.8); transition: 0.3s; }
    .back-btn:hover { background: linear-gradient(135deg, #fff, var(--gold-bright)); transform: translateY(-1px); box-shadow: 0 6px 14px rgba(212,175,55,0.6); }
    
    /* SVG Scroll Engine */
    .dna-svg { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
    .dna-strand-1 { stroke: var(--gold-bright); stroke-width: 4; fill: none; stroke-dasharray: 10000; stroke-dashoffset: 10000; filter: drop-shadow(0 0 8px rgba(212,175,55,0.5)); }
    .dna-strand-2 { stroke: var(--royal-red); stroke-width: 4; fill: none; stroke-dasharray: 10000; stroke-dashoffset: 10000; opacity: 0.8; filter: drop-shadow(0 0 8px rgba(158,27,34,0.5)); }
  </style>
</head>
<body class="dna-page">
  <a href="dashboard.html" class="back-btn">← Back to Dashboard</a>
  
  <div class="dna-header">
    <h1>The Lineage Helix</h1>
    <p>Scroll down to explore the dynamic progression of your family's DNA and history over time.</p>
  </div>
  
  <div class="dna-container" id="dnaContainer">
    <div class="dna-helix">
      <svg class="dna-svg" preserveAspectRatio="none" id="helixSvg"></svg>
    </div>
    <div id="dnaItems"></div>
  </div>

  <script src="js/shared-auth.js"></script>
  <script src="js/shared-data.js"></script>
  <script>
    if (!requireAuth()) throw '';
    
    const currentYear = new Date().getFullYear();
    let events = [];
    
    // Add births
    familyMembers.forEach(m => {
      if (m.age) {
        const birthYear = currentYear - m.age;
        events.push({
          year: birthYear,
          date: birthYear.toString(),
          title: `${m.firstName} Born`,
          desc: `The birth of ${m.firstName} added a new generation to the lineage. ${m.nativePlace ? 'Native of ' + m.nativePlace + '.' : ''}`,
          members: [m]
        });
      }
    });

    // Add marriages (deduplicate)
    const processedMarriages = new Set();
    familyMembers.forEach(m => {
      if (m.spouse && !processedMarriages.has(m.id)) {
        const spouse = getMemberById(m.spouse);
        if (spouse) {
          processedMarriages.add(m.id);
          processedMarriages.add(spouse.id);
          // Estimate marriage year: roughly when the older partner was 25
          const olderAge = Math.max(m.age || 25, spouse.age || 25);
          const marriageYear = (currentYear - olderAge) + 25;
          if (marriageYear <= currentYear) {
            events.push({
              year: marriageYear,
              date: marriageYear.toString(),
              title: `${m.firstName} & ${spouse.firstName} Alliance`,
              desc: `A grand union bringing together the ${m.gotra} and ${spouse.gotra} gotras.`,
              members: [m, spouse]
            });
          }
        }
      }
    });
    
    // Platform initiation
    events.push({
      year: currentYear,
      date: currentYear.toString(),
      title: 'Vansh Platform Initiation',
      desc: 'The entire lineage was successfully digitized. The ancestral history is now dynamically recorded on the Premium Network.',
      members: []
    });

    // Sort chronologically
    events.sort((a, b) => a.year - b.year);
    
    const container = document.getElementById('dnaItems');
    let html = '';
    
    events.forEach((e, i) => {
      const side = i % 2 === 0 ? 'left' : 'right';
      const avaHtml = e.members.map(m => `<div class="dna-ava" style="background-image:url('${m ? m.imageUrl : ''}')"></div>`).join('');
      
      html += `
        <div class="dna-item ${side}">
          <div class="dna-rung"></div>
          <div class="dna-content">
            <div class="dna-date">${e.date}</div>
            <div class="dna-title">${e.title}</div>
            <div class="dna-desc">${e.desc}</div>
            ${avaHtml ? `<div class="dna-avatars">${avaHtml}</div>` : ''}
          </div>
        </div>
      `;
    });
    container.innerHTML = html;
    
    // Montserratsection Observer for items sliding in
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.4 });
    
    document.querySelectorAll('.dna-item').forEach(item => observer.observe(item));
    
    // Setup SVG Helix
    const svg = document.getElementById('helixSvg');
    let path1, path2;
    
    function initHelix() {
      const h = document.getElementById('dnaContainer').offsetHeight;
      svg.setAttribute('viewBox', `0 0 120 ${h}`);
      
      let d1 = `M 60 0 `;
      let d2 = `M 60 0 `;
      const frequency = 400; 
      
      for(let y = 0; y <= h; y += 10) {
        const x1 = 60 + Math.sin(y / frequency * Math.PI * 2) * 50;
        const x2 = 60 + Math.sin((y / frequency * Math.PI * 2) + Math.PI) * 50; 
        d1 += `L ${x1} ${y} `;
        d2 += `L ${x2} ${y} `;
      }
      
      svg.innerHTML = `
        <path id="p1" class="dna-strand-1" d="${d1}" />
        <path id="p2" class="dna-strand-2" d="${d2}" />
      `;
      
      path1 = document.getElementById('p1');
      path2 = document.getElementById('p2');
      
      const len1 = path1.getTotalLength();
      path1.style.strokeDasharray = len1;
      path1.style.strokeDashoffset = len1;
      
      const len2 = path2.getTotalLength();
      path2.style.strokeDasharray = len2;
      path2.style.strokeDashoffset = len2;
    }
    
    window.addEventListener('load', () => {
      initHelix();
      window.addEventListener('scroll', updateHelixScroll);
      updateHelixScroll(); // initial trigger
    });
    
    window.addEventListener('resize', () => {
      initHelix();
      updateHelixScroll();
    });
    
    // Scroll-linked drawing animation
    function updateHelixScroll() {
      if(!path1 || !path2) return;
      const scrollPos = window.scrollY;
      const docHeight = document.body.scrollHeight - window.innerHeight;
      // Calculate scroll percentage (with a slight boost so it finishes drawing before very bottom)
      const scrollPercent = Math.min(scrollPos / (docHeight * 0.9), 1); 
      
      const len1 = path1.getTotalLength();
      path1.style.strokeDashoffset = len1 - (len1 * scrollPercent);
      
      const len2 = path2.getTotalLength();
      path2.style.strokeDashoffset = len2 - (len2 * scrollPercent);
    }
  </script>
</body>
</html>
