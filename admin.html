<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vansh (वंश) — Admin Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/shared.css?v=6">
  <style>
    .gov-header { text-align: center; margin-bottom: 40px; }
    .gov-title { font-family: 'Cinzel', serif; font-size: 32px; font-weight: 700; color: var(--royal-red); }
    .gov-sub { font-size: 15px; color: var(--text-secondary); max-width: 600px; margin: 12px auto 0; }
    
    .approval-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 24px; margin-bottom: 16px; box-shadow: var(--shadow-sm);
      display: flex; justify-content: space-between; align-items: center;
    }
    
    .approval-info { display: flex; align-items: center; gap: 16px; }
    .approval-name { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .approval-meta { font-size: 13px; color: var(--text-secondary); }
    
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-area">
      <header class="topbar" id="topbar"></header>
      <div class="page-content">
        
        <div class="gov-header anim">
          <div class="gov-title">Pending Approvals</div>
          <div class="gov-sub">Review and verify new family member registrations. Only Generation 0 and Generation 1 elders have access to this portal.</div>
        </div>
        
        <div class="anim anim-delay-1" style="max-width: 800px; margin: 0 auto;" id="approvalContainer">
          <!-- Pending approvals will render here -->
        </div>
        
      </div>
    </div>
  </div>

  <script src="js/shared-auth.js"></script>
  <script src="js/shared-data.js"></script>
  <script src="js/shared-nav.js"></script>
  <script>
    if (!requireAuth()) throw '';
    
    // Authorization check
    const currentMember = getMemberById(getAuthData().userId);
    if(currentMember && currentMember.gen > 1) {
      alert("Access Denied: You must be a Generation 0 or 1 elder to access the Admin Portal.");
      window.location.href = 'dashboard.html';
    }
    
    initNav('admin');

    function renderApprovals() {
      const members = getActiveDatabase();
      const container = document.getElementById('approvalContainer');
      const pending = members.filter(m => m.verified === false);

      if (pending.length === 0) {
        container.innerHTML = `
          <div style="text-align:center; padding: 40px; background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border);">
            <div style="font-size: 48px; margin-bottom: 16px;">✅</div>
            <h3 style="font-family:'Cinzel', serif; font-size: 20px; margin-bottom: 8px;">All Caught Up</h3>
            <p style="color: var(--text-secondary); font-size: 14px;">There are no pending member registrations at this time.</p>
          </div>
        `;
        return;
      }

      let html = '';
      pending.forEach(m => {
        html += `
          <div class="approval-card">
            <div class="approval-info">
              <div style="width: 50px; height: 50px; border-radius: 50%; background-color: var(--bg-hover); display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--royal-red);">${m.firstName[0]}${m.lastName ? m.lastName[0] : ''}</div>
              <div>
                <div class="approval-name">${m.firstName} ${m.lastName}</div>
                <div class="approval-meta">${m.email} • ${m.age} yrs • ${m.gender === 'M' ? 'Male' : 'Female'} • ${m.gotra} Gotra</div>
              </div>
            </div>
            <button class="btn btn-gold" onclick="approveMember('${m.id}')">Approve & Verify</button>
          </div>
        `;
      });
      container.innerHTML = html;
    }

    function approveMember(id) {
      if (confirm("Are you sure you want to verify this family member?")) {
        const members = getActiveDatabase();
        const index = members.findIndex(m => m.id === id);
        if (index > -1) {
          members[index].verified = true;
          localStorage.setItem('vansh_family_data_v2', JSON.stringify(members));
          renderApprovals(); // re-render list
        }
      }
    }

    // Initial render
    renderApprovals();
  </script>
</body>
</html>
